<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <title>AstroGuide - Welcome</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="landing-container">
      <div class="auth-container">
        <h1>AstroGuide</h1>
        <p>Your personal Western astrology guide</p>

        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>

        <div class="auth-form" id="login-form">
          <h2>Login</h2>
          <form id="login">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" required />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required />
            </div>
            <button type="submit">Login</button>
          </form>
        </div>

        <div class="auth-form hidden" id="signup-form">
          <h2>Sign Up</h2>
          <form id="signup">
            <div class="form-group">
              <label for="signup-name">Name</label>
              <input type="text" id="signup-name" required />
            </div>
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" required />
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" required />
            </div>
            <div class="form-group">
              <label for="signup-birth-date">Birth Date</label>
              <input type="date" id="signup-birth-date" required />
            </div>
            <div class="form-group">
              <label for="signup-birth-time">Birth Time</label>
              <input type="time" id="signup-birth-time" required />
            </div>
            <div class="form-group">
              <label for="signup-birth-place">Birth Place</label>
              <input
                type="text"
                id="signup-birth-place"
                placeholder="City, Country"
                required
              />
            </div>
            <button type="submit">Sign Up</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Tab switching
      const tabBtns = document.querySelectorAll(".tab-btn");
      const forms = document.querySelectorAll(".auth-form");

      tabBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Remove active class from all buttons and forms
          tabBtns.forEach((b) => b.classList.remove("active"));
          forms.forEach((f) => f.classList.add("hidden"));

          // Add active class to clicked button and corresponding form
          btn.classList.add("active");
          document
            .getElementById(`${btn.dataset.tab}-form`)
            .classList.remove("hidden");
        });
      });

      // Login form submission
      document.getElementById("login").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const submitButton = e.target.querySelector('button[type="submit"]');
        const originalButtonText = submitButton.textContent;

        // Validate inputs
        if (!email || !password) {
          alert("Please enter both email and password");
          return;
        }

        // Show loading state
        submitButton.disabled = true;
        submitButton.textContent = "Logging in...";

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          // Check if response is ok
          if (!response.ok) {
            // Try to get error message from response
            let errorMessage = "Login failed";
            try {
              const errorData = await response.json();
              errorMessage = errorData.error || errorMessage;
            } catch (parseError) {
              // If response isn't JSON, use status text
              errorMessage = `Server error: ${response.status} ${response.statusText}`;
            }
            alert(errorMessage);
            submitButton.disabled = false;
            submitButton.textContent = originalButtonText;
            return;
          }

          const data = await response.json();

          if (data.success) {
            // Store user data and token
            localStorage.setItem("userData", JSON.stringify(data.user));
            localStorage.setItem("token", data.token);

            // Redirect to main page
            window.location.href = "index.html";
          } else {
            alert(data.error || "Login failed. Please check your credentials.");
            submitButton.disabled = false;
            submitButton.textContent = originalButtonText;
          }
        } catch (error) {
          console.error("Login error:", error);

          // Provide more specific error messages
          if (error.name === "TypeError" && error.message.includes("fetch")) {
            alert(
              "Cannot connect to server. Make sure the backend is running and you opened this page from the same address (e.g. http://YOUR-PC-IP:3000 on your phone).",
            );
          } else if (
            error.name === "NetworkError" ||
            error.message.includes("network")
          ) {
            alert("Network error. Please check your internet connection.");
          } else {
            alert(`An error occurred during login: ${error.message}`);
          }

          submitButton.disabled = false;
          submitButton.textContent = originalButtonText;
        }
      });

      // Signup form submission
      document
        .getElementById("signup")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("signup-name").value.trim();
          const email = document.getElementById("signup-email").value.trim();
          const password = document.getElementById("signup-password").value;
          const birthDate = document.getElementById("signup-birth-date").value;
          const birthTime = document.getElementById("signup-birth-time").value;
          const birthPlace = document
            .getElementById("signup-birth-place")
            .value.trim();
          const submitButton = e.target.querySelector('button[type="submit"]');
          const originalButtonText = submitButton.textContent;

          // Validate inputs
          if (
            !name ||
            !email ||
            !password ||
            !birthDate ||
            !birthTime ||
            !birthPlace
          ) {
            alert("Please fill in all fields");
            return;
          }

          // Validate email format
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            alert("Please enter a valid email address");
            return;
          }

          // Show loading state
          submitButton.disabled = true;
          submitButton.textContent = "Signing up...";

          try {
            const response = await fetch("/api/signup", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                name,
                email,
                password,
                birthDate,
                birthTime,
                birthPlace,
              }),
            });

            // Check if response is ok
            if (!response.ok) {
              // Try to get error message from response
              let errorMessage = "Signup failed";
              try {
                const errorData = await response.json();
                errorMessage = errorData.error || errorMessage;
              } catch (parseError) {
                // If response isn't JSON, use status text
                errorMessage = `Server error: ${response.status} ${response.statusText}`;
              }
              alert(errorMessage);
              submitButton.disabled = false;
              submitButton.textContent = originalButtonText;
              return;
            }

            const data = await response.json();

            if (data.success) {
              // Store user data and token
              localStorage.setItem("userData", JSON.stringify(data.user));
              localStorage.setItem("token", data.token);

              // Redirect to main page
              window.location.href = "index.html";
            } else {
              alert(data.error || "Signup failed. Please try again.");
              submitButton.disabled = false;
              submitButton.textContent = originalButtonText;
            }
          } catch (error) {
            console.error("Signup error:", error);

            // Provide more specific error messages
            if (error.name === "TypeError" && error.message.includes("fetch")) {
              alert(
                "Cannot connect to server. Make sure the backend is running and you opened this page from the same address (e.g. http://YOUR-PC-IP:3000 on your phone).",
              );
            } else if (
              error.name === "NetworkError" ||
              error.message.includes("network")
            ) {
              alert("Network error. Please check your internet connection.");
            } else {
              alert(`An error occurred during signup: ${error.message}`);
            }

            submitButton.disabled = false;
            submitButton.textContent = originalButtonText;
          }
        });
    </script>
  </body>
</html>
