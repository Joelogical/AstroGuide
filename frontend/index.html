<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroGuide</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <script>
      // Check if user data exists
      const userData = localStorage.getItem("userData");
      if (!userData) {
        window.location.href = "landing.html";
      }
    </script>

    <div id="connection-banner" class="connection-banner connection-pending">Checking server…</div>
    <div class="main-container">
      <div class="chat-container">
        <div class="chat-header">
          <h1>AstroGuide</h1>
          <div class="profile-switcher">
            <button type="button" id="profile-dropdown-btn" class="profile-dropdown-btn" aria-haspopup="true" aria-expanded="false">
              Chart: <span id="active-profile-name">—</span> ▼
            </button>
            <div id="profile-dropdown" class="profile-dropdown hidden">
              <div id="profile-list"></div>
              <button type="button" id="add-profile-btn" class="add-profile-btn">+ Add profile</button>
            </div>
          </div>
          <button id="logout-button" class="logout-button">Logout</button>
          <button id="clear-button" class="clear-button">Clear Chat</button>
          <button id="recalculate-chart-button" class="recalculate-button">
            Recalculate Chart
          </button>
          <button id="view-raw-data-button" class="view-raw-button">
            View Raw Data
          </button>
        </div>
        <!-- Add profile modal -->
        <div id="add-profile-modal" class="modal hidden">
          <div class="modal-content">
            <h3>Add chart profile</h3>
            <form id="add-profile-form">
              <div class="form-group">
                <label for="profile-name">Profile name</label>
                <input type="text" id="profile-name" placeholder="e.g. Me, Partner, Child" required />
              </div>
              <div class="form-group">
                <label for="profile-birth-date">Birth date</label>
                <input type="date" id="profile-birth-date" required />
              </div>
              <div class="form-group">
                <label for="profile-birth-time">Birth time</label>
                <input type="time" id="profile-birth-time" required />
              </div>
              <div class="form-group">
                <label for="profile-birth-place">Birth place</label>
                <input type="text" id="profile-birth-place" placeholder="City, Country" required />
              </div>
              <div class="modal-actions">
                <button type="button" id="add-profile-cancel" class="btn-secondary">Cancel</button>
                <button type="submit" id="add-profile-submit" class="btn-primary">Add & switch</button>
              </div>
            </form>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="message bot-message initial-message">
            Hello! I'm AstroGuide, your astrological guide. I'm here to help you
            understand yourself through your birth chart. What would you like to
            explore?
          </div>
        </div>
        <div class="input-container">
          <input
            type="text"
            id="message-input"
            placeholder="Type your message here..."
          />
          <button id="send-button">Send</button>
        </div>
      </div>
      <div id="chart-wheel-container" class="chart-wheel-container"></div>
    </div>

    <script>
      const messageInput = document.getElementById("message-input");
      const sendButton = document.getElementById("send-button");
      const chatMessages = document.getElementById("chat-messages");
      const logoutButton = document.getElementById("logout-button");
      const clearButton = document.getElementById("clear-button");
      const recalculateChartButton = document.getElementById(
        "recalculate-chart-button"
      );
      const viewRawDataButton = document.getElementById("view-raw-data-button");

      // ---------- Profile storage (switch between charts) ----------
      const PROFILE_STORAGE_KEY = "chartProfiles";
      const ACTIVE_PROFILE_KEY = "activeProfileId";

      function getChartProfiles() {
        try {
          const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function setChartProfiles(profiles) {
        localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profiles));
      }

      function getActiveProfileId() {
        return localStorage.getItem(ACTIVE_PROFILE_KEY);
      }

      function setActiveProfileId(id) {
        localStorage.setItem(ACTIVE_PROFILE_KEY, id);
      }

      function getActiveProfile() {
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        if (id) {
          const p = profiles.find((x) => x.id === id);
          if (p) return p;
        }
        return profiles.length ? profiles[0] : null;
      }

      function saveActiveProfileChart(birthChartData) {
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        const idx = profiles.findIndex((x) => x.id === id);
        if (idx === -1) return;
        profiles[idx].birthChartData = birthChartData;
        setChartProfiles(profiles);
        // Automatically render the chart wheel when chart data is saved
        if (birthChartData) {
          renderChartWheel(birthChartData);
        }
      }

      function saveActiveProfileConversation(history) {
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        const idx = profiles.findIndex((x) => x.id === id);
        if (idx === -1) return;
        profiles[idx].conversationHistory = history;
        setChartProfiles(profiles);
      }

      function getActiveProfileConversation() {
        const p = getActiveProfile();
        if (!p) return [];
        // Ensure the profile has its own conversation history array
        if (p.conversationHistory === undefined) {
          p.conversationHistory = [];
          const profiles = getChartProfiles();
          const idx = profiles.findIndex((x) => x.id === p.id);
          if (idx !== -1) {
            profiles[idx].conversationHistory = [];
            setChartProfiles(profiles);
          }
        }
        return p.conversationHistory || [];
      }

      function migrateFromLegacyProfiles() {
        const profiles = getChartProfiles();
        if (profiles.length > 0) return;
        const userData = JSON.parse(localStorage.getItem("userData") || "{}");
        const birthChartData = JSON.parse(localStorage.getItem("birthChartData") || "null");
        const name = userData.name || "My chart";
        const id = crypto.randomUUID ? crypto.randomUUID() : "legacy-" + Date.now();
        // Only migrate conversation history for the legacy profile (one-time migration)
        // After migration, each profile will have its own isolated history
        const legacyHistory = JSON.parse(localStorage.getItem("conversationHistory") || "[]");
        const newProfile = {
          id,
          name,
          birthDate: userData.birthDate || "",
          birthTime: userData.birthTime || "",
          birthPlace: userData.birthPlace || "",
          birthChartData: birthChartData || null,
          conversationHistory: legacyHistory, // Only for legacy migration - new profiles get []
        };
        setChartProfiles([newProfile]);
        setActiveProfileId(id);
        localStorage.removeItem("birthChartData");
        localStorage.removeItem("conversationHistory"); // Remove shared key after migration
      }

      function renderProfileDropdown() {
        const profiles = getChartProfiles();
        const activeId = getActiveProfileId();
        const listEl = document.getElementById("profile-list");
        const nameEl = document.getElementById("active-profile-name");
        if (!listEl || !nameEl) return;
        const active = profiles.find((p) => p.id === activeId) || profiles[0];
        nameEl.textContent = active ? active.name : "—";
        listEl.innerHTML = "";
        profiles.forEach((p) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "profile-item";
          btn.textContent = p.name;
          btn.dataset.profileId = p.id;
          if (p.id === activeId) btn.style.fontWeight = "bold";
          btn.addEventListener("click", () => switchToProfile(p.id));
          listEl.appendChild(btn);
        });
      }

      function renderConversation(profile) {
        const container = document.getElementById("chat-messages");
        if (!container) return;
        const initial = container.querySelector(".initial-message");
        container.innerHTML = "";
        if (initial) container.appendChild(initial);
        const history = (profile && profile.conversationHistory) ? profile.conversationHistory : [];
        history.forEach((msg) => {
          const div = document.createElement("div");
          div.className = `message ${msg.role === "user" ? "user-message" : "bot-message"}`;
          div.textContent = msg.content || "";
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      }

      function switchToProfile(profileId) {
        const profiles = getChartProfiles();
        const current = getActiveProfile();
        
        // Ensure current profile has its own conversation history (don't load from shared localStorage)
        if (current) {
          const idx = profiles.findIndex((p) => p.id === current.id);
          if (idx !== -1) {
            // Initialize conversationHistory if it doesn't exist (empty array, not from shared storage)
            if (profiles[idx].conversationHistory === undefined) {
              profiles[idx].conversationHistory = [];
              setChartProfiles(profiles);
            }
          }
        }
        
        setActiveProfileId(profileId);
        const next = getChartProfiles().find((p) => p.id === profileId);
        
        // Ensure the next profile also has its own conversation history
        if (next) {
          const nextIdx = profiles.findIndex((p) => p.id === profileId);
          if (nextIdx !== -1 && profiles[nextIdx].conversationHistory === undefined) {
            profiles[nextIdx].conversationHistory = [];
            setChartProfiles(profiles);
          }
        }
        
        renderProfileDropdown();
        renderConversation(next);
        document.getElementById("profile-dropdown").classList.add("hidden");
        ensureChartLoadedForActiveProfile();
        // Render chart wheel for the switched profile if chart data exists
        if (next && next.birthChartData) {
          renderChartWheel(next.birthChartData);
        } else {
          // Clear wheel if no chart data
          const container = document.getElementById("chart-wheel-container");
          if (container) {
            container.innerHTML = "";
          }
        }
      }

      // Top-level geocoding for use in chat and add-profile flow
      async function getCoordinates(cityName) {
        if (!cityName || cityName.trim() === "") {
          throw new Error("Birth place is required");
        }
        const query = encodeURIComponent(cityName.trim());
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1&addressdetails=1`,
          { headers: { "User-Agent": "AstroGuide/1.0" } }
        );
        if (!response.ok) throw new Error(`Geocoding service error: ${response.status}`);
        const data = await response.json();
        if (!data || data.length === 0) {
          throw new Error(`Location "${cityName}" not found. Please try a more specific location (e.g., "City, Country").`);
        }
        const result = data[0];
        const latitude = parseFloat(result.lat);
        const longitude = parseFloat(result.lon);
        if (isNaN(latitude) || isNaN(longitude)) throw new Error("Invalid coordinates from geocoding");
        if (latitude < -90 || latitude > 90 || longitude < -180 || longitude > 180) {
          throw new Error("Coordinates out of valid range");
        }
        return {
          latitude,
          longitude,
          displayName: result.display_name || cityName,
          originalQuery: cityName,
        };
      }

      function getNthSunday(year, month, n) {
        const firstDay = new Date(year, month - 1, 1);
        const firstSunday = 1 + ((7 - firstDay.getDay()) % 7);
        return firstSunday + (n - 1) * 7;
      }

      function getLastSunday(year, month) {
        const lastDay = new Date(year, month, 0);
        const dayOfWeek = lastDay.getDay();
        return lastDay.getDate() - dayOfWeek;
      }

      async function calculateTimezone(lat, lon, y, m, d) {
        let baseOffset = Math.round(lon / 15);
        if (lon >= -125 && lon < -67) {
          if (lon >= -125 && lon < -112) baseOffset = -8;
          else if (lon >= -112 && lon < -102) baseOffset = -7;
          else if (lon >= -102 && lon < -87) baseOffset = -6;
          else if (lon >= -87 && lon < -67) baseOffset = -5;
          const isArizona = lat >= 31 && lat <= 37 && lon >= -115 && lon < -109;
          const isHawaii = lat >= 18 && lat <= 23 && lon >= -161 && lon < -154;
          if (!isArizona && !isHawaii) {
            if (y >= 2007) {
              const marchStart = getNthSunday(y, 3, 2);
              const novEnd = getNthSunday(y, 11, 1);
              const dateNum = y * 10000 + m * 100 + d;
              const startNum = y * 10000 + 3 * 100 + marchStart;
              const endNum = y * 10000 + 11 * 100 + novEnd;
              if (dateNum >= startNum && dateNum < endNum) baseOffset += 1;
            } else if (y >= 1987) {
              const aprilStart = getNthSunday(y, 4, 1);
              const octEnd = getLastSunday(y, 10);
              const dateNum = y * 10000 + m * 100 + d;
              const startNum = y * 10000 + 4 * 100 + aprilStart;
              const endNum = y * 10000 + 10 * 100 + octEnd;
              if (dateNum >= startNum && dateNum <= endNum) baseOffset += 1;
            }
          }
        }
        return baseOffset;
      }

      /** Fetches birth chart for a profile (birthDate, birthTime, birthPlace). Returns { chartData, resolvedLocation } or throws. */
      async function fetchBirthChartForProfile(profile) {
        if (!profile || !profile.birthDate || !profile.birthTime || !profile.birthPlace) {
          throw new Error("Profile is missing birth date, time, or place.");
        }
        const [year, month, day] = profile.birthDate.split("-").map(Number);
        const [hours, minutes] = profile.birthTime.split(":").map(Number);
        const coordinates = await getCoordinates(profile.birthPlace);
        const timezone = await calculateTimezone(coordinates.latitude, coordinates.longitude, year, month, day);
        const requestData = {
          year, month, day, hour: hours, minute: minutes,
          latitude: coordinates.latitude,
          longitude: coordinates.longitude,
          timezone,
        };
        const response = await fetch("http://localhost:3000/api/birth-chart", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestData),
        });
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.details || err.error || "Failed to calculate birth chart");
        }
        const chartData = await response.json();
        return { chartData, resolvedLocation: coordinates.displayName };
      }

      /** If active profile has birth info but no cached chart, fetch and save it in the background. */
      function ensureChartLoadedForActiveProfile() {
        const profile = getActiveProfile();

        fetchBirthChartForProfile(profile)

      ensureChartLoadedForActiveProfile();

      // Message queue for bot messages
      const botMessageQueue = [];
      let isTyping = false;

      function queueBotMessage(message, isUser = false, fromQueue = false) {
        return new Promise((resolve) => {
          botMessageQueue.push({ message, resolve });
          setTimeout(processBotQueue, 0);
        });
      }

      async function processBotQueue() {
        if (isTyping || botMessageQueue.length === 0) return;
        isTyping = true;
        const { message, resolve } = botMessageQueue.shift();
        await addMessage(message, false, true);
        isTyping = false;
        resolve();
        setTimeout(processBotQueue, 0);
      }

      function addMessage(message, isUser = false, fromQueue = false) {
        return new Promise((resolve) => {
          const messageDiv = document.createElement("div");
          messageDiv.className = `message ${isUser ? "user-message" : "bot-message"}`;

          if (isUser) {
            console.log("[MESSAGE] Adding user message:", message);
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            resolve();
          } else {
            // For bot messages, use typewriter effect only if from queue
            hideSpinner();
            messageDiv.classList.add("typing");
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if (fromQueue) {
              console.log(
                "[TYPEWRITER] Starting typewriter for bot message:",
                message
              );
              typeMessage(messageDiv, message, 30, () => {
                console.log(
                  "[TYPEWRITER] Finished typing bot message:",
                  message
                );
                resolve();
              });
            } else {
              // If not from queue, type instantly (for compatibility)
              messageDiv.textContent = message;
              messageDiv.classList.remove("typing");
              resolve();
            }
          }
        });
      }

      // Updated typeMessage to create a left-to-right sweeping fade-in animation
      function typeMessage(element, message, speed = 30, done) {
        // Set the full message content
        element.textContent = message;

        // Add the fade-in class
        element.classList.add("fade-in");

        // Trigger the animation after a small delay
        setTimeout(() => {
          element.classList.add("animate");
        }, 50);

        // Remove typing class and call done callback after animation
        setTimeout(() => {
          element.classList.remove("typing", "fade-in", "animate");
          if (done) done();
        }, 3000);
      }

      async function handleSendMessage() {
        const message = messageInput.value.trim();
        if (message) {
          console.log("[HANDLE] User sent message:", message);
          await addMessage(message, true);
          messageInput.value = "";

          // Get user data from localStorage
          const userData = JSON.parse(localStorage.getItem("userData"));

          if (!userData) {
            await queueBotMessage(
              "Error: No user data found. Please log in or create an account first."
            );
            return;
          }

          // Use active profile for chart and birth details
          const activeProfile = getActiveProfile();
          let birthChartData = activeProfile ? activeProfile.birthChartData : null;
          const profileBirthDate = activeProfile ? activeProfile.birthDate : userData.birthDate;
          const profileBirthTime = activeProfile ? activeProfile.birthTime : userData.birthTime;
          const profileBirthPlace = activeProfile ? activeProfile.birthPlace : userData.birthPlace;

          if (!birthChartData) {
            // Automatically fetch birth chart on first message for this profile
            const loadingMessage = "Let me take a look at this birth chart...";
            await queueBotMessage(loadingMessage);
            console.log("[SPINNER] Showing spinner after loading message");
            showSpinner();

            if (!profileBirthDate || !profileBirthTime || !profileBirthPlace) {
              await queueBotMessage(
                "This profile is missing birth date, time, or place. Add a profile with full birth data or use the default profile."
              );
              return;
            }

            try {
              const { chartData, resolvedLocation } = await fetchBirthChartForProfile(activeProfile);
              saveActiveProfileChart(chartData);
              birthChartData = chartData;
              await queueBotMessage(
                `I've calculated your birth chart using ${resolvedLocation}! Let me answer your question...`
              );
            } catch (error) {
              console.error("[ERROR] Birth chart fetch:", error);
              const errorMessage = error.message || "I'm having trouble calculating your birth chart right now.";
              await queueBotMessage("Error: " + errorMessage);
              return;
            } finally {
              hideSpinner();
            }
          }

          // Handle questions about the birth chart
          // (birthChartData is either already loaded or was just loaded above)
          if (birthChartData) {
            console.log("[SPINNER] Showing spinner for chat follow-up");
            showSpinner();
            // Get conversation history for the active profile
            let conversationHistory = getActiveProfileConversation().slice();

            // Add the user's message to the conversation history
            conversationHistory.push({
              role: "user",
              content: message,
            });

            try {
              // Send the question along with the birth chart data and conversation history to the backend
              console.log("[API] Sending chat follow-up:", {
                message,
                birthChart: birthChartData,
                conversationHistory,
              });
              const response = await fetch("http://localhost:3000/api/chat", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  message: message,
                  birthChart: birthChartData,
                  conversationHistory: conversationHistory,
                }),
              });

              const data = await response.json().catch(() => ({}));
              console.log("[API] Received chat response:", data);
              console.log(
                "[API] Raw chat response:",
                JSON.stringify(data, null, 2)
              );

              if (!response.ok) {
                const errMsg = data.details || data.error || response.statusText || "Unknown error";
                const stageHint = data.stage != null ? ` [Stage: ${data.stage}]` : "";
                const stackPreview = data.stackPreview && data.stackPreview.length ? "\n\nStack:\n" + data.stackPreview.join("\n") : "";
                const debugHint = data._debug ? ` (${data._debug})` : "";
                console.log("[API] 500 full payload:", data);
                await queueBotMessage(
                  "Server error (" + response.status + "): " + errMsg + stageHint + debugHint + stackPreview + " — Check backend/.env and server terminal for details."
                );
                hideSpinner();
                return;
              }

              // Add the bot's response to the conversation history
              conversationHistory.push({
                role: "assistant",
                content: data.response,
              });

              // Keep only the last 10 messages to maintain context without overwhelming
              if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
              }

              // Save the updated conversation history to the active profile
              saveActiveProfileConversation(conversationHistory);

              await queueBotMessage(data.response);
            } catch (error) {
              console.error("Error:", error);
              await queueBotMessage(
                "I'm having trouble processing your question right now. Could you try rephrasing it?"
              );
            } finally {
              console.log("[SPINNER] Hiding spinner after chat follow-up");
              hideSpinner();
            }
          } else {
            await queueBotMessage(
              "No chart for this profile yet. Send a message to calculate the chart, or add a profile with birth date, time, and place."
            );
          }
        }
      }

      /**
       * Render birth chart wheel with counter-clockwise progression (mirrored/reverse clock)
       * 
       * COORDINATE SYSTEM:
       * - Top-down view: Ascendant at 9 o'clock (left) = 180° in standard polar coordinates
       * - All elements progress COUNTER-CLOCKWISE from Ascendant
       * - Houses: 1, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2 (counter-clockwise)
       * - Zodiac signs: Natural order going counter-clockwise
       * - Uses negated angles in Math.cos/sin to create reverse clock effect
       * 
       * @param {Object} birthChart - Birth chart data with houses, planets, aspects, angles
       */
      function renderChartWheel(birthChart) {
        try {
          console.log("[CHART WHEEL] Rendering chart wheel with data:", birthChart);
          
          // Validate input
          if (!birthChart || typeof birthChart !== 'object') {
            throw new Error("Invalid birth chart data");
          }
          
          // Check if D3 is loaded
          if (typeof d3 === 'undefined') {
            console.error("[CHART WHEEL] D3.js is not loaded!");
            const container = document.getElementById("chart-wheel-container");
            if (container) {
              container.innerHTML = '<div style="color: #ff6b6b; padding: 20px;">Error: D3.js library is not loaded. Please refresh the page.</div>';
            }
            return;
          }

          const container = document.getElementById("chart-wheel-container");
          if (!container) {
            console.error("[CHART WHEEL] Container element not found!");
            return;
          }
          
          container.innerHTML = ""; // Clear previous render

          const width = 700;
          const height = 700;
          // Reduce diameter by 7% total (2% + 5% more) to fit within container border
          const outerRadius = (Math.min(width, height) / 2 - 20) * 0.93;
          const innerRadius = outerRadius * 0.25; // Much smaller inner circle to fill more space
          const centerX = width / 2;
          const centerY = height / 2;

          // Get Ascendant degree for rotation - normalize to 0-360 range
          let ascendantDegree = birthChart.angles?.ascendant?.degree;
          if (ascendantDegree === undefined || ascendantDegree === null || isNaN(ascendantDegree)) {
            console.warn("[CHART WHEEL] Ascendant degree not found, defaulting to 0°");
            ascendantDegree = 0;
          }
          // Normalize to 0-360 range
          ascendantDegree = ((ascendantDegree % 360) + 360) % 360;
          
          const svg = d3.select("#chart-wheel-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", `0 0 ${width} ${height}`)
            .append("g")
            .attr("transform", `translate(${centerX}, ${centerY})`);

        // Helper function to convert degrees to radians
        // MIRRORED/REVERSE CLOCK: For counter-clockwise progression (like astrology charts)
        // Standard polar: 0° = right (3 o'clock), but we want 0° = left (9 o'clock) for Ascendant
        // To create reverse clock effect, we NEGATE the angle in calculations
        function degToRad(deg) {
          return deg * (Math.PI / 180);
        }

        // Helper function to convert chart degree to display degree
        // TOP-DOWN VIEW: Ascendant at 9 o'clock (left) = 180°
        // Houses and signs go COUNTER-CLOCKWISE from Ascendant (like a reverse clock)
        function chartToDisplayDegree(chartDegree) {
          // Validate and normalize input degree to 0-360 range
          if (chartDegree === undefined || chartDegree === null || isNaN(chartDegree)) {
            console.warn("[CHART WHEEL] Invalid chart degree:", chartDegree);
            return 180; // Default to Ascendant position
          }
          const normalizedDegree = ((chartDegree % 360) + 360) % 360;
          // Calculate relative position from Ascendant (increases counter-clockwise)
          const relative = (normalizedDegree - ascendantDegree + 360) % 360;
          // Ascendant (relative 0°) should be at 180° (9 o'clock/left)
          // As relative increases counter-clockwise, display increases counter-clockwise
          return (180 + relative) % 360;
        }

        // Helper function to get position on circle
        // MIRRORED CLOCK: Negate angle to reverse direction (counter-clockwise progression)
        function getPosition(degree, radius = outerRadius) {
          // Validate and normalize degree to 0-360 range
          if (degree === undefined || degree === null || isNaN(degree)) {
            console.warn("[CHART WHEEL] Invalid degree for position:", degree);
            return { x: 0, y: 0 };
          }
          const normalizedDegree = ((degree % 360) + 360) % 360;
          const rad = degToRad(normalizedDegree);
          // NEGATE the angle to create reverse/mirrored clock effect (counter-clockwise)
          return {
            x: Math.cos(-rad) * radius,  // Negate for counter-clockwise
            y: Math.sin(-rad) * radius   // Negate for counter-clockwise
          };
        }

        // Draw outer circle (main wheel)
        svg.append("circle")
          .attr("r", outerRadius)
          .attr("fill", "rgba(30, 41, 59, 0.3)")
          .attr("stroke", "#64748b")
          .attr("stroke-width", 2);

        // Draw inner circle
        svg.append("circle")
          .attr("r", innerRadius)
          .attr("fill", "none")
          .attr("stroke", "#475569")
          .attr("stroke-width", 1)
          .attr("opacity", 0.5);

        // Draw house divisions (12 houses) - COUNTER-CLOCKWISE from Ascendant
        const houses = birthChart.houses || [];
        
        // Sort houses by degree to ensure proper COUNTER-CLOCKWISE order from Ascendant
        // House 1 is at Ascendant, then houses go COUNTER-CLOCKWISE: 1, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2
        const sortedHouses = [...houses].sort((a, b) => {
          if (a.degree === undefined || b.degree === undefined) {
            // Fallback to number if degree not available
            const numA = a.number !== undefined ? a.number : (houses.indexOf(a) + 1);
            const numB = b.number !== undefined ? b.number : (houses.indexOf(b) + 1);
            return numA - numB;
          }
          // Sort by degree going COUNTER-CLOCKWISE from Ascendant (normal sort)
          // Normalize degrees to 0-360 range before calculating relative positions
          const normA = ((a.degree % 360) + 360) % 360;
          const normB = ((b.degree % 360) + 360) % 360;
          const relA = (normA - ascendantDegree + 360) % 360;
          const relB = (normB - ascendantDegree + 360) % 360;
          return relA - relB; // Normal sort for COUNTER-CLOCKWISE
        });

        // Draw house cusps (radial lines) - COUNTER-CLOCKWISE order with interactivity
        sortedHouses.forEach((house) => {
          if (house && house.degree !== undefined && house.degree !== null && !isNaN(house.degree) && house.number !== undefined) {
            const displayDegree = chartToDisplayDegree(house.degree);
            const pos = getPosition(displayDegree, outerRadius);
            
            // House cusp line (from inner circle to outer edge)
            const innerPos = getPosition(displayDegree, innerRadius);
            const houseLine = svg.append("line")
              .attr("x1", innerPos.x)
              .attr("y1", innerPos.y)
              .attr("x2", pos.x)
              .attr("y2", pos.y)
              .attr("stroke", "#64748b")
              .attr("stroke-width", 1.5)
              .attr("opacity", 0.6)
              .attr("class", "house-line")
              .style("cursor", "pointer")
              .on("mouseenter", function() {
                d3.select(this)
                  .attr("stroke-width", 3)
                  .attr("opacity", 1)
                  .attr("stroke", "#10b981");
              })
              .on("mouseleave", function() {
                d3.select(this)
                  .attr("stroke-width", 1.5)
                  .attr("opacity", 0.6)
                  .attr("stroke", "#64748b");
              })
              .on("click", function() {
                queryChartElement(`Tell me about House ${house.number} in my chart`);
              });

            // House number label (inside inner circle, larger) - clickable area
            const labelRadius = innerRadius - 25;
            const labelPos = getPosition(displayDegree, labelRadius);
            const houseGroup = svg.append("g")
              .attr("class", "house-group")
              .style("cursor", "pointer");
            
            // Invisible larger circle for easier clicking
            houseGroup.append("circle")
              .attr("cx", labelPos.x)
              .attr("cy", labelPos.y)
              .attr("r", 25)
              .attr("fill", "transparent")
              .attr("opacity", 0);
            
            const houseText = houseGroup.append("text")
              .attr("x", labelPos.x)
              .attr("y", labelPos.y)
              .attr("text-anchor", "middle")
              .attr("dominant-baseline", "middle")
              .attr("fill", "#e2e8f0")
              .attr("font-size", "18px")
              .attr("font-weight", "bold")
              .text(house.number);
            
            // Hover effects for house number
            houseGroup.on("mouseenter", function() {
              houseText
                .attr("font-size", "22px")
                .attr("fill", "#10b981");
              houseLine
                .attr("stroke-width", 3)
                .attr("opacity", 1)
                .attr("stroke", "#10b981");
            })
            .on("mouseleave", function() {
              houseText
                .attr("font-size", "18px")
                .attr("fill", "#e2e8f0");
              houseLine
                .attr("stroke-width", 1.5)
                .attr("opacity", 0.6)
                .attr("stroke", "#64748b");
            })
            .on("click", function() {
              queryChartElement(`Tell me about House ${house.number} in my chart`);
            });
          }
        });

        // Draw sign divisions (30 degrees each) - show signs on outer edge
        // Signs are fixed: Aries (0-30°), Taurus (30-60°), Gemini (60-90°), etc.
        // Position them COUNTER-CLOCKWISE from Ascendant
        const signAbbrev = ["Ari", "Tau", "Gem", "Can", "Leo", "Vir", 
                           "Lib", "Sco", "Sag", "Cap", "Aqu", "Pis"];
        
        // Draw sign markers - each sign starts at its degree (0°, 30°, 60°, etc.)
        // Convert these to display degrees so they appear COUNTER-CLOCKWISE from Ascendant
        for (let i = 0; i < 12; i++) {
          const signStartDegree = i * 30; // Aries starts at 0°, Taurus at 30°, etc.
          const displayDegree = chartToDisplayDegree(signStartDegree);
          const pos = getPosition(displayDegree, outerRadius);
          
          // Sign division line (shorter, on outer edge)
          const innerSignPos = getPosition(displayDegree, outerRadius * 0.98);
          svg.append("line")
            .attr("x1", innerSignPos.x)
            .attr("y1", innerSignPos.y)
            .attr("x2", pos.x)
            .attr("y2", pos.y)
            .attr("stroke", "#475569")
            .attr("stroke-width", 1)
            .attr("opacity", 0.4);

          // Sign label (on outer edge) - positioned at middle of sign (15° into each sign) - clickable
          const signMidDegree = signStartDegree + 15;
          const signMidDisplayDegree = chartToDisplayDegree(signMidDegree);
          const signLabelPos = getPosition(signMidDisplayDegree, outerRadius + 15);
          const signFullNames = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", 
                                "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
          
          const signGroup = svg.append("g")
            .attr("class", "sign-group")
            .style("cursor", "pointer");
          
          // Invisible larger circle for easier clicking
          signGroup.append("circle")
            .attr("cx", signLabelPos.x)
            .attr("cy", signLabelPos.y)
            .attr("r", 20)
            .attr("fill", "transparent")
            .attr("opacity", 0);
          
          const signText = signGroup.append("text")
            .attr("x", signLabelPos.x)
            .attr("y", signLabelPos.y)
            .attr("text-anchor", "middle")
            .attr("dominant-baseline", "middle")
            .attr("fill", "#94a3b8")
            .attr("font-size", "14px")
            .attr("font-weight", "600")
            .text(signAbbrev[i]);
          
          // Hover effects for sign
          signGroup.on("mouseenter", function() {
            signText
              .attr("font-size", "18px")
              .attr("fill", "#10b981");
          })
          .on("mouseleave", function() {
            signText
              .attr("font-size", "14px")
              .attr("fill", "#94a3b8");
          })
          .on("click", function() {
            queryChartElement(`Tell me about ${signFullNames[i]} in my chart`);
          });
        }

        // Draw planets
        const planetColors = {
          sun: "#FFD700",
          moon: "#C0C0C0",
          mercury: "#8C7853",
          venus: "#FFC649",
          mars: "#FF4500",
          jupiter: "#C88A3D",
          saturn: "#FAD5A5",
          uranus: "#4FD0E7",
          neptune: "#4166F5",
          pluto: "#8B008B"
        };

        const planetSymbols = {
          sun: "☉",
          moon: "☽",
          mercury: "☿",
          venus: "♀",
          mars: "♂",
          jupiter: "♃",
          saturn: "♄",
          uranus: "♅",
          neptune: "♆",
          pluto: "♇"
        };

        // Draw planets (positioned closer to outer edge to fill wheel)
        if (birthChart.planets && typeof birthChart.planets === 'object') {
          Object.entries(birthChart.planets).forEach(([planetName, planetData]) => {
            if (planetData && 
                planetData.degree !== undefined && 
                planetData.degree !== null && 
                !isNaN(planetData.degree) &&
                planetData.house !== undefined && 
                planetData.house !== null) {
              // Position planet closer to outer edge (use 85% of outer radius)
              const planetRingRadius = outerRadius * 0.85;
              const displayDegree = chartToDisplayDegree(planetData.degree);
              const pos = getPosition(displayDegree, planetRingRadius);
              const color = planetColors[planetName.toLowerCase()] || "#ffffff";
              
              // Create planet group for interactivity
              const planetGroup = svg.append("g")
                .attr("class", "planet-group")
                .style("cursor", "pointer");
              
              // Invisible larger circle for easier clicking (bubble out area)
              planetGroup.append("circle")
                .attr("cx", pos.x)
                .attr("cy", pos.y)
                .attr("r", 30)
                .attr("fill", "transparent")
                .attr("opacity", 0);
              
              // Planet circle (larger for visibility)
              const planetCircle = planetGroup.append("circle")
                .attr("cx", pos.x)
                .attr("cy", pos.y)
                .attr("r", 14)
                .attr("fill", color)
                .attr("stroke", "#0f172a")
                .attr("stroke-width", 2.5);

              // Planet symbol (larger, more visible)
              const planetSymbol = planetGroup.append("text")
                .attr("x", pos.x)
                .attr("y", pos.y)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", "#0f172a")
                .attr("font-size", "16px")
                .attr("font-weight", "bold")
                .text(planetSymbols[planetName.toLowerCase()] || planetName.charAt(0).toUpperCase());

              // Planet name label (positioned outside planet circle, closer to edge)
              const labelRadius = planetRingRadius + 25;
              const labelPos = getPosition(displayDegree, labelRadius);
              const planetLabel = planetGroup.append("text")
                .attr("x", labelPos.x)
                .attr("y", labelPos.y)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", "#f1f5f9")
                .attr("font-size", "13px")
                .attr("font-weight", "600")
                .text(planetName.charAt(0).toUpperCase() + planetName.slice(1));

              // House number indicator (inside, near planet)
              const houseLabelRadius = planetRingRadius - 18;
              const houseLabelPos = getPosition(displayDegree, houseLabelRadius);
              const houseNumText = planetGroup.append("text")
                .attr("x", houseLabelPos.x)
                .attr("y", houseLabelPos.y)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", "#cbd5e1")
                .attr("font-size", "12px")
                .attr("font-weight", "bold")
                .attr("opacity", 0.9)
                .text(planetData.house);
              
              // Hover effects - bubble out
              planetGroup.on("mouseenter", function() {
                planetCircle
                  .attr("r", 18)
                  .attr("stroke-width", 3.5)
                  .transition()
                  .duration(200);
                planetSymbol
                  .attr("font-size", "20px")
                  .transition()
                  .duration(200);
                planetLabel
                  .attr("font-size", "15px")
                  .attr("fill", "#10b981")
                  .transition()
                  .duration(200);
              })
              .on("mouseleave", function() {
                planetCircle
                  .attr("r", 14)
                  .attr("stroke-width", 2.5)
                  .transition()
                  .duration(200);
                planetSymbol
                  .attr("font-size", "16px")
                  .transition()
                  .duration(200);
                planetLabel
                  .attr("font-size", "13px")
                  .attr("fill", "#f1f5f9")
                  .transition()
                  .duration(200);
              })
              .on("click", function() {
                const planetDisplayName = planetName.charAt(0).toUpperCase() + planetName.slice(1);
                queryChartElement(`Tell me about ${planetDisplayName} in my chart`);
              });
            }
          });
        }

        // Draw Ascendant (AC) and Midheaven (MC) - prominent lines
        // Ascendant should be at 9 o'clock (left) = 180° in standard polar coordinates
        if (birthChart.angles) {
          // Ascendant line (at 180° = 9 o'clock = left) - clickable
          const acDisplayDegree = chartToDisplayDegree(ascendantDegree); // Should be 180°
          const acPos = getPosition(acDisplayDegree, outerRadius);
          const innerAcPos = getPosition(acDisplayDegree, innerRadius);
          const acGroup = svg.append("g")
            .attr("class", "ac-group")
            .style("cursor", "pointer");
          
          const acLine = acGroup.append("line")
            .attr("x1", innerAcPos.x)
            .attr("y1", innerAcPos.y)
            .attr("x2", acPos.x)
            .attr("y2", acPos.y)
            .attr("stroke", "#10b981")
            .attr("stroke-width", 3)
            .attr("opacity", 0.9);

          const acLabelPos = getPosition(acDisplayDegree, outerRadius + 18);
          const acLabel = acGroup.append("text")
            .attr("x", acLabelPos.x)
            .attr("y", acLabelPos.y)
            .attr("text-anchor", "middle")
            .attr("dominant-baseline", "middle")
            .attr("fill", "#10b981")
            .attr("font-size", "16px")
            .attr("font-weight", "bold")
            .text("AC");
          
          acGroup.on("mouseenter", function() {
            acLine
              .attr("stroke-width", 4)
              .attr("opacity", 1);
            acLabel
              .attr("font-size", "20px");
          })
          .on("mouseleave", function() {
            acLine
              .attr("stroke-width", 3)
              .attr("opacity", 0.9);
            acLabel
              .attr("font-size", "16px");
          })
          .on("click", function() {
            queryChartElement("Tell me about my Ascendant in my chart");
          });

          // Midheaven (MC) - relative to Ascendant - clickable
          if (birthChart.angles.midheaven?.degree !== undefined) {
            const mcDisplayDegree = chartToDisplayDegree(birthChart.angles.midheaven.degree);
            const mcPos = getPosition(mcDisplayDegree, outerRadius);
            const innerMcPos = getPosition(mcDisplayDegree, innerRadius);
            const mcGroup = svg.append("g")
              .attr("class", "mc-group")
              .style("cursor", "pointer");
            
            const mcLine = mcGroup.append("line")
              .attr("x1", innerMcPos.x)
              .attr("y1", innerMcPos.y)
              .attr("x2", mcPos.x)
              .attr("y2", mcPos.y)
              .attr("stroke", "#3b82f6")
              .attr("stroke-width", 3)
              .attr("opacity", 0.9);

            const mcLabelPos = getPosition(mcDisplayDegree, outerRadius + 18);
            const mcLabel = mcGroup.append("text")
              .attr("x", mcLabelPos.x)
              .attr("y", mcLabelPos.y)
              .attr("text-anchor", "middle")
              .attr("dominant-baseline", "middle")
              .attr("fill", "#3b82f6")
              .attr("font-size", "16px")
              .attr("font-weight", "bold")
              .text("MC");
            
            mcGroup.on("mouseenter", function() {
              mcLine
                .attr("stroke-width", 4)
                .attr("opacity", 1);
              mcLabel
                .attr("font-size", "20px");
            })
            .on("mouseleave", function() {
              mcLine
                .attr("stroke-width", 3)
                .attr("opacity", 0.9);
              mcLabel
                .attr("font-size", "16px");
            })
            .on("click", function() {
              queryChartElement("Tell me about my Midheaven (MC) in my chart");
            });
          }
        }

        // Draw aspect lines (major aspects only)
        if (birthChart.aspects && Array.isArray(birthChart.aspects)) {
          const majorAspects = ["conjunction", "opposition", "square", "trine", "sextile"];
          const aspectColors = {
            conjunction: "#ffffff",
            opposition: "#ff6b6b",
            square: "#ffa500",
            trine: "#4ecdc4",
            sextile: "#95e1d3"
          };

          birthChart.aspects.forEach(aspect => {
            if (aspect && 
                aspect.aspect && 
                majorAspects.includes(aspect.aspect.toLowerCase()) &&
                aspect.planet1 && 
                aspect.planet2) {
              const planet1 = birthChart.planets[aspect.planet1?.toLowerCase()];
              const planet2 = birthChart.planets[aspect.planet2?.toLowerCase()];
              
              if (planet1 && 
                  planet2 && 
                  planet1.degree !== undefined && 
                  planet1.degree !== null &&
                  !isNaN(planet1.degree) &&
                  planet2.degree !== undefined && 
                  planet2.degree !== null &&
                  !isNaN(planet2.degree)) {
                // Position aspect lines at same radius as planets (85% of outer radius)
                const planetRingRadius = outerRadius * 0.85;
                const displayDeg1 = chartToDisplayDegree(planet1.degree);
                const displayDeg2 = chartToDisplayDegree(planet2.degree);
                const pos1 = getPosition(displayDeg1, planetRingRadius);
                const pos2 = getPosition(displayDeg2, planetRingRadius);
                const color = aspectColors[aspect.aspect.toLowerCase()] || "#ffffff";
                
                // Create invisible wider line for easier clicking
                const midX = (pos1.x + pos2.x) / 2;
                const midY = (pos1.y + pos2.y) / 2;
                const lineLength = Math.sqrt(Math.pow(pos2.x - pos1.x, 2) + Math.pow(pos2.y - pos1.y, 2));
                const angle = Math.atan2(pos2.y - pos1.y, pos2.x - pos1.x);
                
                // Invisible wider hit area for the aspect line
                const hitArea = svg.insert("line", "circle")
                  .attr("x1", pos1.x)
                  .attr("y1", pos1.y)
                  .attr("x2", pos2.x)
                  .attr("y2", pos2.y)
                  .attr("stroke", "transparent")
                  .attr("stroke-width", 15) // Wider hit area
                  .attr("opacity", 0)
                  .style("cursor", "pointer");
                
                // Draw aspect line (behind planets, more visible)
                const aspectLine = svg.insert("line", "circle")
                  .attr("x1", pos1.x)
                  .attr("y1", pos1.y)
                  .attr("x2", pos2.x)
                  .attr("y2", pos2.y)
                  .attr("stroke", color)
                  .attr("stroke-width", 2.5)
                  .attr("opacity", 0.6)
                  .style("cursor", "pointer");
                
                // Hover and click handlers for aspect line
                const aspectGroup = svg.append("g")
                  .attr("class", "aspect-group");
                
                aspectLine.on("mouseenter", function() {
                  d3.select(this)
                    .attr("stroke-width", 4)
                    .attr("opacity", 0.9)
                    .transition()
                    .duration(200);
                })
                .on("mouseleave", function() {
                  d3.select(this)
                    .attr("stroke-width", 2.5)
                    .attr("opacity", 0.6)
                    .transition()
                    .duration(200);
                })
                .on("click", function() {
                  const planet1Name = aspect.planet1.charAt(0).toUpperCase() + aspect.planet1.slice(1);
                  const planet2Name = aspect.planet2.charAt(0).toUpperCase() + aspect.planet2.slice(1);
                  const aspectName = aspect.aspect.charAt(0).toUpperCase() + aspect.aspect.slice(1);
                  queryChartElement(`Tell me about the ${aspectName} aspect between ${planet1Name} and ${planet2Name} in my chart`);
                });
                
                // Also make hit area clickable
                hitArea.on("click", function() {
                  const planet1Name = aspect.planet1.charAt(0).toUpperCase() + aspect.planet1.slice(1);
                  const planet2Name = aspect.planet2.charAt(0).toUpperCase() + aspect.planet2.slice(1);
                  const aspectName = aspect.aspect.charAt(0).toUpperCase() + aspect.aspect.slice(1);
                  queryChartElement(`Tell me about the ${aspectName} aspect between ${planet1Name} and ${planet2Name} in my chart`);
                });
              }
            }
          });
        }

        // Center label (larger, more prominent)
        svg.append("text")
          .attr("x", 0)
          .attr("y", 0)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .attr("fill", "#e2e8f0")
          .attr("font-size", "18px")
          .attr("font-weight", "bold")
          .text("Birth Chart");

          console.log("[CHART WHEEL] Chart wheel rendered successfully");
        } catch (error) {
          console.error("[CHART WHEEL] Error rendering chart wheel:", error);
          const container = document.getElementById("chart-wheel-container");
          if (container) {
            container.innerHTML = `<div style="color: #ff6b6b; padding: 20px; text-align: center;">Error rendering chart wheel: ${error.message}<br><small>Check console for details</small></div>`;
          }
        }
      }

      // Add function to toggle raw chart data visibility
      function toggleRawChartData(button) {
        const container = button.parentElement;
        let rawDataDiv = container.querySelector(".raw-chart-data");

        if (!rawDataDiv) {
          // Create raw data div if it doesn't exist
          rawDataDiv = document.createElement("div");
          rawDataDiv.className = "raw-chart-data";
          rawDataDiv.style.display = "none";

          const birthChart = JSON.parse(button.dataset.chart);
          let rawData = "";

          // Birth Data
          rawData += "Birth Data:\n";
          rawData += `Date: ${birthChart.birthData.date}\n`;
          rawData += `Time: ${birthChart.birthData.time}\n`;
          rawData += `Location: ${birthChart.birthData.location.latitude}°N, ${birthChart.birthData.location.longitude}°E (UTC${birthChart.birthData.location.timezone})\n\n`;

          // Angular Points
          rawData += "Angular Points:\n";
          rawData += `Ascendant: ${birthChart.angles.ascendant.degree.toFixed(
            2
          )}° ${birthChart.angles.ascendant.sign} (${
            birthChart.angles.ascendant.element
          })\n`;
          rawData += `Midheaven: ${birthChart.angles.midheaven.degree.toFixed(
            2
          )}° ${birthChart.angles.midheaven.sign} (${
            birthChart.angles.midheaven.element
          })\n\n`;

          // Planetary Positions
          rawData += "Planetary Positions:\n";
          for (const [planet, data] of Object.entries(birthChart.planets)) {
            rawData += `${
              planet.charAt(0).toUpperCase() + planet.slice(1)
            }: ${data.degree.toFixed(2)}° ${data.sign} (${data.element})`;
            if (data.isRetrograde) rawData += " ℞";
            rawData += ` - House ${data.house}\n`;
          }
          rawData += "\n";

          // Houses
          rawData += "Houses:\n";
          birthChart.houses.forEach((house) => {
            rawData += `House ${house.number}: ${house.degree.toFixed(2)}° ${
              house.sign
            } (${house.element})\n`;
          });
          rawData += "\n";

          // Aspects
          rawData += "Aspects:\n";
          birthChart.aspects.forEach((aspect) => {
            rawData += `${
              aspect.planet1.charAt(0).toUpperCase() + aspect.planet1.slice(1)
            } ${aspect.aspect} ${
              aspect.planet2.charAt(0).toUpperCase() + aspect.planet2.slice(1)
            } (${aspect.orb.toFixed(2)}° orb)\n`;
          });

          rawDataDiv.textContent = rawData;
          container.appendChild(rawDataDiv);
        }

        if (rawDataDiv.style.display === "none") {
          rawDataDiv.style.display = "block";
          button.textContent = "Hide Raw Chart Data";
        } else {
          rawDataDiv.style.display = "none";
          button.textContent = "View Raw Chart Data";
        }
      }

      function showSpinner() {
        const spinnerContainer = document.createElement("div");
        spinnerContainer.className = "spinner-container";

        const spinner = document.createElement("div");
        spinner.className = "spinner";

        const typingIndicator = document.createElement("div");
        typingIndicator.className = "typing-indicator";
        typingIndicator.textContent = "AstroGuide is thinking";

        spinnerContainer.appendChild(spinner);
        spinnerContainer.appendChild(typingIndicator);
        chatMessages.appendChild(spinnerContainer);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function hideSpinner() {
        const spinnerContainer = document.querySelector(".spinner-container");
        if (spinnerContainer) {
          spinnerContainer.remove();
        }
      }
    </script>
  </body>
</html>
