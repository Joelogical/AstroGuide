<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroGuide</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>

    <script>
      // Check if user data exists
      const userData = localStorage.getItem("userData");
      if (!userData) {
        window.location.href = "landing.html";
      }
    </script>

    <div id="connection-banner" class="connection-banner connection-pending">
      Checking server…
    </div>
    <div class="main-container">
      <div class="chat-container">
        <div class="chat-header">
          <h1>AstroGuide</h1>
          <div class="profile-switcher">
            <button
              type="button"
              id="profile-dropdown-btn"
              class="profile-dropdown-btn"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Chart: <span id="active-profile-name">—</span> ▼
            </button>
            <div id="profile-dropdown" class="profile-dropdown hidden">
              <div id="profile-list"></div>
              <button
                type="button"
                id="add-profile-btn"
                class="add-profile-btn"
              >
                + Add profile
              </button>
              <button
                type="button"
                id="clear-chat-dropdown-btn"
                class="dropdown-action-btn"
              >
                Clear Chat
              </button>
            </div>
            <div class="settings-switcher">
              <button
                type="button"
                id="settings-dropdown-btn"
                class="settings-dropdown-btn settings-gear-btn"
                aria-haspopup="true"
                aria-expanded="false"
                title="Settings"
              >
                ⚙
              </button>
              <div id="settings-dropdown" class="settings-dropdown hidden">
                <button
                  type="button"
                  id="settings-profile-preferences-btn"
                  class="dropdown-action-btn"
                >
                  Profile preferences
                </button>
                <button
                  type="button"
                  id="view-raw-data-settings-btn"
                  class="dropdown-action-btn"
                >
                  View Raw Data
                </button>
                <button
                  type="button"
                  id="logout-settings-btn"
                  class="dropdown-action-btn"
                >
                  Log out
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- Add / Edit profile modal -->
        <div id="add-profile-modal" class="modal hidden">
          <div class="modal-content">
            <h3 id="add-profile-modal-title">Add chart profile</h3>
            <form id="add-profile-form">
              <div class="form-group">
                <label for="profile-name">Profile name</label>
                <input
                  type="text"
                  id="profile-name"
                  placeholder="e.g. Me, Partner, Child"
                  required
                />
              </div>
              <div class="form-group">
                <label for="profile-birth-date">Birth date</label>
                <input type="date" id="profile-birth-date" required />
              </div>
              <div class="form-group">
                <label for="profile-birth-time">Birth time</label>
                <input type="time" id="profile-birth-time" required />
              </div>
              <div class="form-group">
                <label for="profile-birth-place">Birth place</label>
                <input
                  type="text"
                  id="profile-birth-place"
                  placeholder="City, Country"
                  required
                />
              </div>
              <div class="modal-actions">
                <button
                  type="button"
                  id="add-profile-cancel"
                  class="btn-secondary"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  id="add-profile-submit"
                  class="btn-primary"
                >
                  Add &amp; switch
                </button>
              </div>
            </form>
          </div>
        </div>
        <!-- Profile preferences modal (memory: mode, sensitivity) -->
        <div id="profile-preferences-modal" class="modal hidden">
          <div class="modal-content">
            <h3>Profile preferences</h3>
            <p style="color: #a0a0c0; font-size: 0.85em; margin: 0 0 14px 0">
              So the chat feels continuous and knows your preferences.
            </p>
            <div class="form-group">
              <label for="profile-memory-mode">Astrology level</label>
              <select id="profile-memory-mode" class="profile-memory-select">
                <option value="beginner">
                  Beginner – plain language, avoid jargon
                </option>
                <option value="advanced">
                  Advanced – deeper, can use terminology
                </option>
              </select>
            </div>
            <div class="form-group">
              <label>Sensitivity (optional)</label>
              <div class="preference-checkbox">
                <input
                  type="checkbox"
                  id="pref-softer"
                  value="softer language"
                />
                <label for="pref-softer">Softer language</label>
              </div>
              <div class="preference-checkbox">
                <input
                  type="checkbox"
                  id="pref-strengths"
                  value="focus on strengths"
                />
                <label for="pref-strengths">Focus on strengths</label>
              </div>
              <div class="preference-checkbox">
                <input
                  type="checkbox"
                  id="pref-no-prediction"
                  value="avoid prediction"
                />
                <label for="pref-no-prediction">Avoid prediction</label>
              </div>
            </div>
            <div class="modal-actions">
              <button
                type="button"
                id="profile-preferences-cancel"
                class="btn-secondary"
              >
                Cancel
              </button>
              <button
                type="button"
                id="profile-preferences-save"
                class="btn-primary"
              >
                Save
              </button>
            </div>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="message bot-message initial-message">
            Hello! I'm AstroGuide, your astrological guide. I'm here to help you
            understand yourself through your birth chart. What would you like to
            explore?
          </div>
        </div>
        <div class="input-container">
          <input
            type="text"
            id="message-input"
            placeholder="Type your message here..."
          />
          <button id="send-button">Send</button>
        </div>
      </div>
      <div class="chart-sidebar">
        <div id="chart-wheel-container" class="chart-wheel-container"></div>
        <div id="chart-table-container" class="chart-table-container"></div>
      </div>
    </div>

    <script>
      const messageInput = document.getElementById("message-input");
      const sendButton = document.getElementById("send-button");
      const chatMessages = document.getElementById("chat-messages");
      const logoutSettingsBtn = document.getElementById("logout-settings-btn");
      const clearDropdownBtn = document.getElementById("clear-chat-dropdown-btn");
      const viewRawDataSettingsBtn = document.getElementById(
        "view-raw-data-settings-btn",
      );

      // ---------- Profile storage (switch between charts) ----------
      const PROFILE_STORAGE_KEY = "chartProfiles";
      const ACTIVE_PROFILE_KEY = "activeProfileId";

      function getChartProfiles() {
        try {
          const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function setChartProfiles(profiles) {
        localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profiles));
      }

      function getActiveProfileId() {
        return localStorage.getItem(ACTIVE_PROFILE_KEY);
      }

      function setActiveProfileId(id) {
        localStorage.setItem(ACTIVE_PROFILE_KEY, id);
      }

      function getActiveProfile() {
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        if (id) {
          const p = profiles.find((x) => x.id === id);
          if (p) return p;
        }
        return profiles.length ? profiles[0] : null;
      }

      function saveActiveProfileChart(birthChartData) {
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        const idx = profiles.findIndex((x) => x.id === id);
        if (idx === -1) return;
        profiles[idx].birthChartData = birthChartData;
        setChartProfiles(profiles);
        // Automatically render the chart wheel when chart data is saved
        if (birthChartData) {
          renderChartWheel(birthChartData);
        }
      }

      function saveActiveProfileChartSummary(summary) {
        if (!summary || typeof summary !== "object") return;
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        const idx = profiles.findIndex((x) => x.id === id);
        if (idx === -1) return;
        profiles[idx].chartSummary = summary;
        setChartProfiles(profiles);
      }

      function saveActiveProfileConversation(history) {
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        const idx = profiles.findIndex((x) => x.id === id);
        if (idx === -1) return;
        profiles[idx].conversationHistory = history;
        setChartProfiles(profiles);
      }

      function getActiveProfileConversation() {
        const p = getActiveProfile();
        if (!p) return [];
        // Ensure the profile has its own conversation history array
        if (p.conversationHistory === undefined) {
          p.conversationHistory = [];
          const profiles = getChartProfiles();
          const idx = profiles.findIndex((x) => x.id === p.id);
          if (idx !== -1) {
            profiles[idx].conversationHistory = [];
            setChartProfiles(profiles);
          }
        }
        return p.conversationHistory || [];
      }

      function getDefaultProfileMemory() {
        return {
          preferredMode: "beginner",
          lifeThemesDiscussed: [],
          userGoals: [],
          sensitivityFlags: [],
          priorTopicsSummary: "",
        };
      }

      function getActiveProfileMemory() {
        const p = getActiveProfile();
        if (!p) return getDefaultProfileMemory();
        if (!p.memory || typeof p.memory !== "object") {
          p.memory = getDefaultProfileMemory();
          const profiles = getChartProfiles();
          const idx = profiles.findIndex((x) => x.id === p.id);
          if (idx !== -1) {
            profiles[idx].memory = p.memory;
            setChartProfiles(profiles);
          }
        }
        return p.memory;
      }

      function mergeMemoryUpdate(update) {
        if (!update || typeof update !== "object") return;
        const profiles = getChartProfiles();
        const id = getActiveProfileId();
        const idx = profiles.findIndex((x) => x.id === id);
        if (idx === -1) return;
        const mem = profiles[idx].memory || getDefaultProfileMemory();
        if (
          Array.isArray(update.lifeThemesDiscussed) &&
          update.lifeThemesDiscussed.length > 0
        ) {
          mem.lifeThemesDiscussed = [
            ...new Set([
              ...(mem.lifeThemesDiscussed || []),
              ...update.lifeThemesDiscussed,
            ]),
          ].slice(-20);
        }
        if (Array.isArray(update.userGoals) && update.userGoals.length > 0) {
          mem.userGoals = [
            ...new Set([...(mem.userGoals || []), ...update.userGoals]),
          ].slice(-15);
        }
        if (
          Array.isArray(update.sensitivityFlags) &&
          update.sensitivityFlags.length > 0
        ) {
          mem.sensitivityFlags = [
            ...new Set([
              ...(mem.sensitivityFlags || []),
              ...update.sensitivityFlags,
            ]),
          ].slice(-10);
        }
        if (
          update.priorTopicsSummary &&
          String(update.priorTopicsSummary).trim()
        ) {
          mem.priorTopicsSummary = String(update.priorTopicsSummary)
            .trim()
            .slice(0, 500);
        }
        profiles[idx].memory = mem;
        setChartProfiles(profiles);
      }

      function migrateFromLegacyProfiles() {
        const profiles = getChartProfiles();
        if (profiles.length > 0) return;
        const userData = JSON.parse(localStorage.getItem("userData") || "{}");
        const birthChartData = JSON.parse(
          localStorage.getItem("birthChartData") || "null",
        );
        const name = userData.name || "My chart";
        const id = crypto.randomUUID
          ? crypto.randomUUID()
          : "legacy-" + Date.now();
        // Only migrate conversation history for the legacy profile (one-time migration)
        // After migration, each profile will have its own isolated history
        const legacyHistory = JSON.parse(
          localStorage.getItem("conversationHistory") || "[]",
        );
        const newProfile = {
          id,
          name,
          birthDate: userData.birthDate || "",
          birthTime: userData.birthTime || "",
          birthPlace: userData.birthPlace || "",
          birthChartData: birthChartData || null,
          conversationHistory: legacyHistory, // Only for legacy migration - new profiles get []
          memory: {
            preferredMode: "beginner",
            lifeThemesDiscussed: [],
            userGoals: [],
            sensitivityFlags: [],
            priorTopicsSummary: "",
          },
        };
        setChartProfiles([newProfile]);
        setActiveProfileId(id);
        localStorage.removeItem("birthChartData");
        localStorage.removeItem("conversationHistory"); // Remove shared key after migration
      }

      function deleteProfile(profileId) {

      function switchToProfile(profileId) {
        const profiles = getChartProfiles();
        const current = getActiveProfile();

        // Ensure current profile has its own conversation history (don't load from shared localStorage)
        if (current) {
          const idx = profiles.findIndex((p) => p.id === current.id);
          if (idx !== -1) {
            // Initialize conversationHistory if it doesn't exist (empty array, not from shared storage)
            if (profiles[idx].conversationHistory === undefined) {
              profiles[idx].conversationHistory = [];
              setChartProfiles(profiles);
            }
          }
        }

        setActiveProfileId(profileId);
        const next = getChartProfiles().find((p) => p.id === profileId);

        // Ensure the next profile also has its own conversation history
        if (next) {
          const nextIdx = profiles.findIndex((p) => p.id === profileId);
          if (
            nextIdx !== -1 &&
            profiles[nextIdx].conversationHistory === undefined
          ) {
            profiles[nextIdx].conversationHistory = [];
            setChartProfiles(profiles);
          }
        }

        renderProfileDropdown();
        renderConversation(next);
        document.getElementById("profile-dropdown").classList.add("hidden");
        ensureChartLoadedForActiveProfile();
        // Render chart wheel for the switched profile if chart data exists
        if (next && next.birthChartData) {
          renderChartWheel(next.birthChartData);
        } else {
          // Clear wheel if no chart data
          const container = document.getElementById("chart-wheel-container");
          if (container) {
            container.innerHTML = "";
          }
          clearChartTable();
        }
      }

      // Top-level geocoding for use in chat and add-profile flow
      async function getCoordinates(cityName) {
        if (!cityName || cityName.trim() === "") {
          throw new Error("Birth place is required");
        }
        const query = encodeURIComponent(cityName.trim());
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1&addressdetails=1`,
          { headers: { "User-Agent": "AstroGuide/1.0" } },
        );
        if (!response.ok)
          throw new Error(`Geocoding service error: ${response.status}`);
        const data = await response.json();
        if (!data || data.length === 0) {
          throw new Error(
            `Location "${cityName}" not found. Please try a more specific location (e.g., "City, Country").`,
          );
        }
        const result = data[0];
        const latitude = parseFloat(result.lat);
        const longitude = parseFloat(result.lon);
        if (isNaN(latitude) || isNaN(longitude))
          throw new Error("Invalid coordinates from geocoding");
        if (
          latitude < -90 ||
          latitude > 90 ||
          longitude < -180 ||
          longitude > 180
        ) {
          throw new Error("Coordinates out of valid range");
        }
        return {
          latitude,
          longitude,
          displayName: result.display_name || cityName,
          originalQuery: cityName,
        };
      }

      function getNthSunday(year, month, n) {
        const firstDay = new Date(year, month - 1, 1);
        const firstSunday = 1 + ((7 - firstDay.getDay()) % 7);
        return firstSunday + (n - 1) * 7;
      }

      function getLastSunday(year, month) {
        const lastDay = new Date(year, month, 0);
        const dayOfWeek = lastDay.getDay();
        return lastDay.getDate() - dayOfWeek;
      }

      async function calculateTimezone(lat, lon, y, m, d) {
        let baseOffset = Math.round(lon / 15);
        if (lon >= -125 && lon < -67) {
          if (lon >= -125 && lon < -112) baseOffset = -8;
          else if (lon >= -112 && lon < -102) baseOffset = -7;
          else if (lon >= -102 && lon < -87) baseOffset = -6;
          else if (lon >= -87 && lon < -67) baseOffset = -5;
          const isArizona = lat >= 31 && lat <= 37 && lon >= -115 && lon < -109;
          const isHawaii = lat >= 18 && lat <= 23 && lon >= -161 && lon < -154;
          if (!isArizona && !isHawaii) {
            if (y >= 2007) {
              const marchStart = getNthSunday(y, 3, 2);
              const novEnd = getNthSunday(y, 11, 1);
              const dateNum = y * 10000 + m * 100 + d;
              const startNum = y * 10000 + 3 * 100 + marchStart;
              const endNum = y * 10000 + 11 * 100 + novEnd;
              if (dateNum >= startNum && dateNum < endNum) baseOffset += 1;
            } else if (y >= 1987) {
              const aprilStart = getNthSunday(y, 4, 1);
              const octEnd = getLastSunday(y, 10);
              const dateNum = y * 10000 + m * 100 + d;
              const startNum = y * 10000 + 4 * 100 + aprilStart;
              const endNum = y * 10000 + 10 * 100 + octEnd;
              if (dateNum >= startNum && dateNum <= endNum) baseOffset += 1;
            }
          }
        }
        return baseOffset;
      }

      /** Fetches birth chart for a profile (birthDate, birthTime, birthPlace). Returns { chartData, resolvedLocation } or throws. */
      async function fetchBirthChartForProfile(profile) {
        if (
          !profile ||
          !profile.birthDate ||
          !profile.birthTime ||
          !profile.birthPlace
        ) {
          throw new Error("Profile is missing birth date, time, or place.");
        }
        const [year, month, day] = profile.birthDate.split("-").map(Number);
        const [hours, minutes] = profile.birthTime.split(":").map(Number);
        const coordinates = await getCoordinates(profile.birthPlace);
        const timezone = await calculateTimezone(
          coordinates.latitude,
          coordinates.longitude,
          year,
          month,
          day,
        );
        const requestData = {
          year,
          month,
          day,
          hour: hours,
          minute: minutes,
          latitude: coordinates.latitude,
          longitude: coordinates.longitude,
          timezone,
        };
        const response = await fetch("http://localhost:3000/api/birth-chart", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestData),
        });
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(
            err.details || err.error || "Failed to calculate birth chart",
          );
        }
        const chartData = await response.json();
        return { chartData, resolvedLocation: coordinates.displayName };
      }

      /** If active profile has birth info but no cached chart, fetch and save it in the background. */
      function ensureChartLoadedForActiveProfile() {
        const profile = getActiveProfile();
        if (
          !profile ||
          profile.birthChartData ||
          !profile.birthDate ||
          !profile.birthTime ||
          !profile.birthPlace
        )
          return;
        fetchBirthChartForProfile(profile)
          .then(({ chartData }) => {
            saveActiveProfileChart(chartData);
          })
          .catch((err) => console.warn("[Chart preload]", err.message));
      }

      // Chart table (astro.com style) – planets + house cusps, dark theme
      const CHART_TABLE_SIGN_ABBR = { Aries: "Ari", Taurus: "Tau", Gemini: "Gem", Cancer: "Can", Leo: "Leo", Virgo: "Vir", Libra: "Lib", Scorpio: "Sco", Sagittarius: "Sag", Capricorn: "Cap", Aquarius: "Aqu", Pisces: "Pis" };
      const CHART_TABLE_PLANET_ORDER = ["sun", "moon", "mercury", "venus", "mars", "jupiter", "saturn", "uranus", "neptune", "pluto"];
      const CHART_TABLE_PLANET_CHARS = {};
      [0x2609, 0x263d, 0x263f, 0x2640, 0x2642, 0x2643, 0x2644, 0x2645, 0x2646, 0x2647].forEach((code, i) => {
        CHART_TABLE_PLANET_CHARS[CHART_TABLE_PLANET_ORDER[i]] = String.fromCodePoint(code, 0xfe0e);
      });
      function formatLongitude(degree, sign, isRetrograde) {
        if (degree === undefined || degree === null || isNaN(degree)) return "—";
        const degInSign = ((degree % 360) + 360) % 30;
        const d = Math.floor(degInSign);
        const minFrac = (degInSign - d) * 60;
        const m = Math.floor(minFrac);
        const s = Math.round((minFrac - m) * 60);
        const signAbbr = (sign && CHART_TABLE_SIGN_ABBR[sign]) ? CHART_TABLE_SIGN_ABBR[sign] : "?";
        let out = d + " " + signAbbr + " " + m + "'" + (s < 10 ? "0" : "") + s + '"';
        if (isRetrograde) out += " r";
        return out;
      }
      function renderChartTable(birthChart) {
        const container = document.getElementById("chart-table-container");
        if (!container || !birthChart || !birthChart.planets) {
          if (container) container.innerHTML = "";
          return;
        }
        const planets = birthChart.planets;
        const angles = birthChart.angles || {};
        const houses = birthChart.houses || [];
        let html = '<table class="chart-table"><thead><tr><th class="col-planet">Planet</th><th class="col-longitude">Longitude</th><th class="col-house">H</th></tr></thead><tbody>';
        CHART_TABLE_PLANET_ORDER.forEach(function (key) {
          const p = planets[key];
          if (!p || p.degree === undefined) return;
          const name = key.charAt(0).toUpperCase() + key.slice(1);
          const glyph = CHART_TABLE_PLANET_CHARS[key] || "";
          const lon = formatLongitude(p.degree, p.sign, p.isRetrograde);
          const house = (p.house != null && p.house !== undefined) ? p.house : "—";
          html += '<tr><td class="col-planet">' + glyph + ' ' + name + '</td><td class="col-longitude">' + lon + '</td><td class="col-house">' + house + '</td></tr>';
        });
        html += '</tbody></table>';
        const houseByNumber = {};
        houses.forEach(function (h) { if (h && h.number != null) houseByNumber[h.number] = h; });
        // House cusps block – only AC (1), 2, 3, and MC (10), 11, 12, like astro.com.
        // Opposite houses are implied and not repeated.
        html += '<table class="chart-table"><tbody>';
        function cuspLabel(num) {
          if (num === 1) return 'AC';
          if (num === 10) return 'MC';
          return String(num);
        }
        function cuspCellContent(num) {
          const h = houseByNumber[num];
          if (!h) return cuspLabel(num) + ': —';
          return cuspLabel(num) + ': ' + formatLongitude(h.degree, h.sign, false);
        }
        // First row: AC (1), 2, 3
        html += '<tr class="house-cusps-row">';
        [1, 2, 3].forEach(function (n) {
          html += '<td class="col-planet">' + cuspCellContent(n) + '</td>';
        });
        html += '</tr>';
        // Second row: MC (10), 11, 12
        html += '<tr class="house-cusps-row">';
        [10, 11, 12].forEach(function (n) {
          html += '<td class="col-planet">' + cuspCellContent(n) + '</td>';
        });
        html += '</tr>';
        html += '</tbody></table>';
        container.innerHTML = html;
      }
      function clearChartTable() {
        const container = document.getElementById("chart-table-container");
        if (container) container.innerHTML = "";
      }

      migrateFromLegacyProfiles();
      // Sync active profile ID if stale (e.g. deleted profile or wrong storage): ensure it exists in the list
      const profiles = getChartProfiles();
      const storedActiveId = getActiveProfileId();
      if (profiles.length > 0 && storedActiveId) {
        const found = profiles.some((p) => p.id === storedActiveId);
        if (!found) setActiveProfileId(profiles[0].id);
      } else if (profiles.length > 0 && !storedActiveId) {
        setActiveProfileId(profiles[0].id);
      }
      renderProfileDropdown();
      const activeProfile = getActiveProfile();
      if (
        activeProfile &&
        activeProfile.conversationHistory &&
        activeProfile.conversationHistory.length > 0
      ) {
        renderConversation(activeProfile);
      }
      // Show chart wheel for active profile on load if we have cached chart data
      if (activeProfile && activeProfile.birthChartData) {
        renderChartWheel(activeProfile.birthChartData);
      } else {
        const chartContainer = document.getElementById("chart-wheel-container");
        if (chartContainer && !chartContainer.querySelector("svg")) {
          chartContainer.innerHTML =
            '<div class="chart-placeholder">Chart will appear when a profile with a birth chart is selected or loaded.</div>';
          clearChartTable();
        }
      }
      // Preload chart for active profile so View raw data works without sending a message
      ensureChartLoadedForActiveProfile();

      // Message queue for bot messages
      const botMessageQueue = [];
      let isTyping = false;

      function queueBotMessage(message, isUser = false, fromQueue = false) {
        return new Promise((resolve) => {
          botMessageQueue.push({ message, resolve });
          setTimeout(processBotQueue, 0);
        });
      }

      async function processBotQueue() {
        if (isTyping || botMessageQueue.length === 0) return;
        isTyping = true;
        const { message, resolve } = botMessageQueue.shift();
        await addMessage(message, false, true);
        isTyping = false;
        resolve();
        setTimeout(processBotQueue, 0);
      }

      function addMessage(message, isUser = false, fromQueue = false) {
        return new Promise((resolve) => {
          const messageDiv = document.createElement("div");
          messageDiv.className = `message ${isUser ? "user-message" : "bot-message"}`;

          if (isUser) {
            console.log("[MESSAGE] Adding user message:", message);
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            resolve();
          } else {
            // For bot messages, use typewriter effect only if from queue
            hideSpinner();
            messageDiv.classList.add("typing");
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if (fromQueue) {
              console.log(
                "[TYPEWRITER] Starting typewriter for bot message:",
                message,
              );
              typeMessage(messageDiv, message, 30, () => {
                console.log(
                  "[TYPEWRITER] Finished typing bot message:",
                  message,
                );
                resolve();
              });
            } else {
              // If not from queue, type instantly (for compatibility)
              messageDiv.textContent = message;
              messageDiv.classList.remove("typing");
              resolve();
            }
          }
        });
      }

      // Updated typeMessage to create a left-to-right sweeping fade-in animation
      function typeMessage(element, message, speed = 30, done) {
        // Set the full message content
        element.textContent = message;

        // Add the fade-in class
        element.classList.add("fade-in");

        // Trigger the animation after a small delay
        setTimeout(() => {
          element.classList.add("animate");
        }, 50);

        // Remove typing class and call done callback after animation
        setTimeout(() => {
          element.classList.remove("typing", "fade-in", "animate");
          if (done) done();
        }, 3000);
      }

      async function handleSendMessage() {
        const message = messageInput.value.trim();
        if (message) {
          console.log("[HANDLE] User sent message:", message);
          await addMessage(message, true);
          messageInput.value = "";

          // Get user data from localStorage
          const userData = JSON.parse(localStorage.getItem("userData"));

          if (!userData) {
            await queueBotMessage(
              "Error: No user data found. Please log in or create an account first.",
            );
            return;
          }

          // Use active profile for chart and birth details
          const activeProfile = getActiveProfile();
          let birthChartData = activeProfile
            ? activeProfile.birthChartData
            : null;
          const profileBirthDate = activeProfile
            ? activeProfile.birthDate
            : userData.birthDate;
          const profileBirthTime = activeProfile
            ? activeProfile.birthTime
            : userData.birthTime;
          const profileBirthPlace = activeProfile
            ? activeProfile.birthPlace
            : userData.birthPlace;

          if (!birthChartData) {
            // Automatically fetch birth chart on first message for this profile
            const loadingMessage = "Let me take a look at this birth chart...";
            await queueBotMessage(loadingMessage);
            console.log("[SPINNER] Showing spinner after loading message");
            showSpinner();

            if (!profileBirthDate || !profileBirthTime || !profileBirthPlace) {
              await queueBotMessage(
                "This profile is missing birth date, time, or place. Add a profile with full birth data or use the default profile.",
              );
              return;
            }

            try {
              const { chartData, resolvedLocation } =
                await fetchBirthChartForProfile(activeProfile);
              saveActiveProfileChart(chartData);
              birthChartData = chartData;
              await queueBotMessage(
                `I've calculated your birth chart using ${resolvedLocation}! Let me answer your question...`,
              );
            } catch (error) {
              console.error("[ERROR] Birth chart fetch:", error);
              const errorMessage =
                error.message ||
                "I'm having trouble calculating your birth chart right now.";
              await queueBotMessage("Error: " + errorMessage);
              return;
            } finally {
              hideSpinner();
            }
          }

          // Handle questions about the birth chart
          // (birthChartData is either already loaded or was just loaded above)
          if (birthChartData) {
            console.log("[SPINNER] Showing spinner for chat follow-up");
            showSpinner();
            // Get conversation history for the active profile
            let conversationHistory = getActiveProfileConversation().slice();

            // If user is repeating a prompt/topic, show a brief "thinking" cue (deeper answer + more specific sources)
            function isRepeatPrompt(currentMsg, history) {
              const text = String(currentMsg || "").toLowerCase();
              if (text.length < 8) return false;
              const stop = new Set([
                "the",
                "a",
                "an",
                "and",
                "or",
                "but",
                "to",
                "of",
                "in",
                "on",
                "for",
                "with",
                "at",
                "from",
                "by",
                "about",
                "as",
                "is",
                "are",
                "was",
                "were",
                "be",
                "been",
                "being",
                "i",
                "me",
                "my",
                "you",
                "your",
                "we",
                "our",
                "it",
                "this",
                "that",
                "these",
                "those",
                "what",
                "why",
                "how",
                "when",
                "where",
                "tell",
                "explain",
                "please",
              ]);
              function tokens(s) {
                return String(s || "")
                  .toLowerCase()
                  .replace(/[^a-z0-9\s]/g, " ")
                  .split(/\s+/)
                  .filter((w) => w && w.length > 2 && !stop.has(w));
              }
              function jaccard(a, b) {
                const A = new Set(a);
                const B = new Set(b);
                if (A.size === 0 || B.size === 0) return 0;
                let inter = 0;
                for (const x of A) if (B.has(x)) inter++;
                const union = A.size + B.size - inter;
                return union ? inter / union : 0;
              }
              const curTok = tokens(text);
              const recentUser = (history || [])
                .filter((m) => m && m.role === "user" && m.content)
                .slice(-8);
              for (const m of recentUser) {
                const prev = String(m.content || "").toLowerCase();
                if (!prev) continue;
                if (prev === text) return true;
                if (
                  prev.length > 0 &&
                  (prev.includes(text) || text.includes(prev)) &&
                  Math.min(prev.length, text.length) > 18
                )
                  return true;
                const sim = jaccard(curTok, tokens(prev));
                if (sim >= 0.45) return true;
              }
              return false;
            }
            if (isRepeatPrompt(message, conversationHistory)) {
              await queueBotMessage(
                "Give me a second—I'm going to think about this from a deeper angle and pull more specific sources.",
              );
              // queueBotMessage() hides the spinner while it renders; re-show spinner so the user sees ongoing work during the API call
              showSpinner();
            }

            // Add the user's message to the conversation history
            conversationHistory.push({
              role: "user",
              content: message,
            });

            try {
              // Send the question along with the birth chart data and conversation history to the backend
              console.log("[API] Sending chat follow-up:", {
                message,
                birthChart: birthChartData,
                conversationHistory,
              });
              const response = await fetch("http://localhost:3000/api/chat", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  message: message,
                  birthChart: birthChartData,
                  conversationHistory: conversationHistory,
                  profileMemory: getActiveProfileMemory(),
                  chartSummary:
                    getActiveProfile() && getActiveProfile().chartSummary
                      ? getActiveProfile().chartSummary
                      : null,
                }),
              });

              const data = await response.json().catch(() => ({}));
              console.log("[API] Received chat response:", data);
              if (data.memoryUpdate) {
                mergeMemoryUpdate(data.memoryUpdate);
              }
              if (data.chartSummaryUpdate) {
                saveActiveProfileChartSummary(data.chartSummaryUpdate);
              }
              console.log(
                "[API] Raw chat response:",
                JSON.stringify(data, null, 2),
              );

              if (!response.ok) {
                const errMsg =
                  data.details ||
                  data.error ||
                  response.statusText ||
                  "Unknown error";
                const stageHint =
                  data.stage != null ? ` [Stage: ${data.stage}]` : "";
                const stackPreview =
                  data.stackPreview && data.stackPreview.length
                    ? "\n\nStack:\n" + data.stackPreview.join("\n")
                    : "";
                const debugHint = data._debug ? ` (${data._debug})` : "";
                console.log("[API] 500 full payload:", data);
                await queueBotMessage(
                  "Server error (" +
                    response.status +
                    "): " +
                    errMsg +
                    stageHint +
                    debugHint +
                    stackPreview +
                    " — Check backend/.env and server terminal for details.",
                );
                hideSpinner();
                return;
              }

              // Add the bot's response to the conversation history
              conversationHistory.push({
                role: "assistant",
                content: data.response,
              });

              // Keep only the last 10 messages to maintain context without overwhelming
              if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
              }

              // Save the updated conversation history to the active profile
              saveActiveProfileConversation(conversationHistory);

              await queueBotMessage(data.response);
            } catch (error) {
              console.error("Error:", error);
              await queueBotMessage(
                "I'm having trouble processing your question right now. Could you try rephrasing it?",
              );
            } finally {
              console.log("[SPINNER] Hiding spinner after chat follow-up");
              hideSpinner();
            }
          } else {
            await queueBotMessage(
              "No chart for this profile yet. Send a message to calculate the chart, or add a profile with birth date, time, and place.",
            );
          }
        }
      }
