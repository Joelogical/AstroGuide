      /**
       * Render birth chart wheel with counter-clockwise progression (mirrored/reverse clock)
       *
       * COORDINATE SYSTEM:
       * - Top-down view: Ascendant at 9 o'clock (left) = 180° in standard polar coordinates
       * - All elements progress COUNTER-CLOCKWISE from Ascendant
       * - Houses: 1, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2 (counter-clockwise)
       * - Zodiac signs: Natural order going counter-clockwise
       * - Uses negated angles in Math.cos/sin to create reverse clock effect
       *
       * @param {Object} birthChart - Birth chart data with houses, planets, aspects, angles
       */
      function renderChartWheel(birthChart) {
        try {
          console.log(
            "[CHART WHEEL] Rendering chart wheel with data:",
            birthChart,
          );

          // Validate input
          if (!birthChart || typeof birthChart !== "object") {
            throw new Error("Invalid birth chart data");
          }

          // Check if D3 is loaded
          if (typeof d3 === "undefined") {
            console.error("[CHART WHEEL] D3.js is not loaded!");
            const container = document.getElementById("chart-wheel-container");
            if (container) {
              container.innerHTML =
                '<div style="color: #ff6b6b; padding: 20px;">Error: D3.js library is not loaded. Please refresh the page.</div>';
            }
            return;
          }

          const container = document.getElementById("chart-wheel-container");
          if (!container) {
            console.error("[CHART WHEEL] Container element not found!");
            return;
          }

          container.innerHTML = ""; // Clear previous render
          clearChartTable();

          const width = 700;
          const height = 700;
          // Zodiac surrounds houses: total radius, then house wheel, notch band, zodiac ring
          const totalRadius = (Math.min(width, height) / 2 - 20) * 0.93;
          const innerRadius = totalRadius * 0.125; // center circle ~50% smaller than before (was 0.25)
          const zodiacBandHeight = 40;
          const notchBandHeight = 12;
          const houseOuterRadius = totalRadius - zodiacBandHeight - notchBandHeight;
          const notchInnerRadius = houseOuterRadius;
          const notchOuterRadius = houseOuterRadius + notchBandHeight;
          const zodiacRingInner = notchOuterRadius;
          const zodiacRingOuter = totalRadius;
          const outerRadius = totalRadius;
          const centerX = width / 2;
          const centerY = height / 2;

          // Get Ascendant degree for rotation - normalize to 0-360 range
          let ascendantDegree = birthChart.angles?.ascendant?.degree;
          if (
            ascendantDegree === undefined ||
            ascendantDegree === null ||
            isNaN(ascendantDegree)
          ) {
            console.warn(
              "[CHART WHEEL] Ascendant degree not found, defaulting to 0°",
            );
            ascendantDegree = 0;
          }
          // Normalize to 0-360 range
          ascendantDegree = ((ascendantDegree % 360) + 360) % 360;

          const svg = d3
            .select("#chart-wheel-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", `0 0 ${width} ${height}`)
            .append("g")
            .attr("transform", `translate(${centerX}, ${centerY})`);

          // Helper function to convert degrees to radians
          // MIRRORED/REVERSE CLOCK: For counter-clockwise progression (like astrology charts)
          // Standard polar: 0° = right (3 o'clock), but we want 0° = left (9 o'clock) for Ascendant
          // To create reverse clock effect, we NEGATE the angle in calculations
          function degToRad(deg) {
            return deg * (Math.PI / 180);
          }

          // Helper function to convert chart degree to display degree
          // TOP-DOWN VIEW: Ascendant at 9 o'clock (left) = 180°
          // Houses and signs go COUNTER-CLOCKWISE from Ascendant (like a reverse clock)
          function chartToDisplayDegree(chartDegree) {
            // Validate and normalize input degree to 0-360 range
            if (
              chartDegree === undefined ||
              chartDegree === null ||
              isNaN(chartDegree)
            ) {
              console.warn("[CHART WHEEL] Invalid chart degree:", chartDegree);
              return 180; // Default to Ascendant position
            }
            const normalizedDegree = ((chartDegree % 360) + 360) % 360;
            // Calculate relative position from Ascendant (increases counter-clockwise)
            const relative = (normalizedDegree - ascendantDegree + 360) % 360;
            // Ascendant (relative 0°) should be at 180° (9 o'clock/left)
            // As relative increases counter-clockwise, display increases counter-clockwise
            return (180 + relative) % 360;
          }

          // Helper function to get position on circle
          // MIRRORED CLOCK: Negate angle to reverse direction (counter-clockwise progression)
          function getPosition(degree, radius = outerRadius) {
            // Validate and normalize degree to 0-360 range
            if (degree === undefined || degree === null || isNaN(degree)) {
              console.warn(
                "[CHART WHEEL] Invalid degree for position:",
                degree,
              );
              return { x: 0, y: 0 };
            }
            const normalizedDegree = ((degree % 360) + 360) % 360;
            const rad = degToRad(normalizedDegree);
            // NEGATE the angle to create reverse/mirrored clock effect (counter-clockwise)
            return {
              x: Math.cos(-rad) * radius, // Negate for counter-clockwise
              y: Math.sin(-rad) * radius, // Negate for counter-clockwise
            };
          }

          // House wheel fill (stops at house outer edge)
          svg.append("circle")
            .attr("r", houseOuterRadius)
            .attr("fill", "rgba(30, 41, 59, 0.3)")
            .attr("stroke", "none");

          // Draw inner circle
          svg.append("circle")
            .attr("r", innerRadius)
            .attr("fill", "none")
            .attr("stroke", "#475569")
            .attr("stroke-width", 1)
            .attr("opacity", 0.5);

          // Zodiac ring (band surrounding houses) – dark theme
          svg.append("circle")
            .attr("r", zodiacRingOuter)
            .attr("fill", "rgba(51, 65, 85, 0.7)")
            .attr("stroke", "none");
          svg.append("circle")
            .attr("r", zodiacRingInner)
            .attr("fill", "rgba(30, 41, 59, 0.3)")
            .attr("stroke", "none");

          // Degree notches – pronounced: every degree visible, every 5° longer, every 10° / sign start longest
          for (let deg = 0; deg < 360; deg++) {
            const displayDeg = chartToDisplayDegree(deg);
            const isSignStart = deg % 30 === 0;
            const isTen = deg % 10 === 0;
            const isFive = deg % 5 === 0;
            let tickLen = 3;
            let strokeW = 0.7;
            let opacity = 0.5;
            if (isSignStart) { tickLen = notchBandHeight; strokeW = 2; opacity = 1; }
            else if (isTen) { tickLen = 8; strokeW = 1.2; opacity = 0.9; }
            else if (isFive) { tickLen = 5; strokeW = 1; opacity = 0.75; }
            const inner = getPosition(displayDeg, notchInnerRadius);
            const outer = getPosition(displayDeg, notchInnerRadius + tickLen);
            svg.append("line")
              .attr("x1", inner.x)
              .attr("y1", inner.y)
              .attr("x2", outer.x)
              .attr("y2", outer.y)
              .attr("stroke", "#94a3b8")
              .attr("stroke-width", strokeW)
              .attr("opacity", opacity);
          }

          // Sign division lines – only within the zodiac ring (do not extend into house section)
          for (let i = 0; i < 12; i++) {
            const signDegree = i * 30;
            const displayDeg = chartToDisplayDegree(signDegree);
            const innerPos = getPosition(displayDeg, zodiacRingInner);
            const outerPos = getPosition(displayDeg, totalRadius);
            svg.append("line")
              .attr("x1", innerPos.x)
              .attr("y1", innerPos.y)
              .attr("x2", outerPos.x)
              .attr("y2", outerPos.y)
              .attr("stroke", "#cbd5e1")
              .attr("stroke-width", 1.5)
              .attr("opacity", 0.85);
          }

          // Outer circle stroke (edge of zodiac ring)
          svg.append("circle")
            .attr("r", totalRadius)
            .attr("fill", "none")
            .attr("stroke", "#cbd5e1")
            .attr("stroke-width", 2);

          // Planet ticks on zodiac – short line at each planet’s degree (no label)
          // Draw house divisions (12 houses) - COUNTER-CLOCKWISE from Ascendant
          const houses = birthChart.houses || [];

          // Sort houses by degree to ensure proper COUNTER-CLOCKWISE order from Ascendant
          // House 1 is at Ascendant, then houses go COUNTER-CLOCKWISE: 1, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2
          const sortedHouses = [...houses].sort((a, b) => {
            if (a.degree === undefined || b.degree === undefined) {
              // Fallback to number if degree not available
              const numA =
                a.number !== undefined ? a.number : houses.indexOf(a) + 1;
              const numB =
                b.number !== undefined ? b.number : houses.indexOf(b) + 1;
              return numA - numB;
            }
            // Sort by degree going COUNTER-CLOCKWISE from Ascendant (normal sort)
            // Normalize degrees to 0-360 range before calculating relative positions
            const normA = ((a.degree % 360) + 360) % 360;
            const normB = ((b.degree % 360) + 360) % 360;
            const relA = (normA - ascendantDegree + 360) % 360;
            const relB = (normB - ascendantDegree + 360) % 360;
            return relA - relB; // Normal sort for COUNTER-CLOCKWISE
          });

          // Draw house cusps (radial lines) - COUNTER-CLOCKWISE order with interactivity
          sortedHouses.forEach((house) => {
            if (
              house &&
              house.degree !== undefined &&
              house.degree !== null &&
              !isNaN(house.degree) &&
              house.number !== undefined
            ) {
              const displayDegree = chartToDisplayDegree(house.degree);
              const pos = getPosition(displayDegree, houseOuterRadius);

              // House cusp line (from inner circle to house outer edge)
              const innerPos = getPosition(displayDegree, innerRadius);

              // Invisible wider hit area for house line (for easier clicking)
              const houseHitArea = svg
                .append("line")
                .attr("x1", innerPos.x)
                .attr("y1", innerPos.y)
                .attr("x2", pos.x)
                .attr("y2", pos.y)
                .attr("stroke", "transparent")
                .attr("stroke-width", 25) // Broad invisible hit area
                .attr("opacity", 0)
                .style("cursor", "pointer")
                .on("mouseenter", function () {
                  houseLine
                    .attr("stroke-width", 3)
                    .attr("opacity", 1)
                    .attr("stroke", "#10b981");
                })
                .on("mouseleave", function () {
                  houseLine
                    .attr("stroke-width", 1.5)
                    .attr("opacity", 0.6)
                    .attr("stroke", "#cbd5e1");
                })
                .on("click", function () {
                  const houseSign = house.sign || "";
                  queryChartElement(
                    `House ${house.number}${houseSign ? ` ${houseSign}` : ""}`,
                  );
                });

              const houseLine = svg
                .append("line")
                .attr("x1", innerPos.x)
                .attr("y1", innerPos.y)
                .attr("x2", pos.x)
                .attr("y2", pos.y)
                .attr("stroke", "#cbd5e1")
                .attr("stroke-width", 1.5)
                .attr("opacity", 0.6)
                .attr("class", "house-line")
                .style("cursor", "pointer")
                .on("mouseenter", function () {
                  d3.select(this)
                    .attr("stroke-width", 3)
                    .attr("opacity", 1)
                    .attr("stroke", "#10b981");
                })
                .on("mouseleave", function () {
                  d3.select(this)
                    .attr("stroke-width", 1.5)
                    .attr("opacity", 0.6)
                    .attr("stroke", "#cbd5e1");
                })
                .on("click", function () {
                  const houseSign = house.sign || "";
                  queryChartElement(
                    `House ${house.number}${houseSign ? ` ${houseSign}` : ""}`,
                  );
                });

              // House number label: just inside the house (past the cusp), ~13px from center circle
              const labelRadius = innerRadius + 13;
              const degreeIntoHouse = 10; // degrees past cusp so number sits in house, not on border
              const labelDegree = (displayDegree + degreeIntoHouse) % 360;
              const labelPos = getPosition(labelDegree, labelRadius);
              const houseGroup = svg
                .append("g")
                .attr("class", "house-group")
                .style("cursor", "pointer");

              // Invisible larger circle for easier clicking
              houseGroup
                .append("circle")
                .attr("cx", labelPos.x)
                .attr("cy", labelPos.y)
                .attr("r", 25)
                .attr("fill", "transparent")
                .attr("opacity", 0);

              const houseText = houseGroup
                .append("text")
                .attr("x", labelPos.x)
                .attr("y", labelPos.y)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", "#e2e8f0")
                .attr("font-size", "11px")
                .attr("font-weight", "200")
                .text(house.number);

              // Hover effects for house number
              houseGroup
                .on("mouseenter", function () {
                  houseText.attr("font-size", "15px").attr("fill", "#10b981").attr("font-weight", "200");
                  houseLine
                    .attr("stroke-width", 3)
                    .attr("opacity", 1)
                    .attr("stroke", "#10b981");
                })
                .on("mouseleave", function () {
                  houseText.attr("font-size", "11px").attr("fill", "#e2e8f0").attr("font-weight", "200");
                  houseLine
                    .attr("stroke-width", 1.5)
                    .attr("opacity", 0.6)
                    .attr("stroke", "#cbd5e1");
                })
                .on("click", function () {
                  const houseSign = house.sign || "";
                  queryChartElement(
                    `House ${house.number}${houseSign ? ` ${houseSign}` : ""}`,
                  );
                });
            }
          });

          // Planet ticks inside houses: from zodiac inner edge inward (extend 2/3 toward planet ring)
          const tickMid = (houseOuterRadius - 1 + (houseOuterRadius * 1.1 + 10)) / 2 + 14;
          const tickInward = houseOuterRadius * 0.85 + 10;
          const planetTickInnerRadius = tickMid * (1 / 3) + tickInward * (2 / 3);
          if (birthChart.planets && typeof birthChart.planets === "object") {
            Object.values(birthChart.planets).forEach((planetData) => {
              if (
                planetData &&
                planetData.degree !== undefined &&
                planetData.degree !== null &&
                !isNaN(planetData.degree)
              ) {
                const displayDeg = chartToDisplayDegree(planetData.degree);
                const inner = getPosition(displayDeg, planetTickInnerRadius);
                const outer = getPosition(displayDeg, zodiacRingInner);
                svg.append("line")
                  .attr("x1", inner.x)
                  .attr("y1", inner.y)
                  .attr("x2", outer.x)
                  .attr("y2", outer.y)
                  .attr("stroke", "#cbd5e1")
                  .attr("stroke-width", 2)
                  .attr("opacity", 1);
              }
            });
          }

          // Zodiac glyphs: use Unicode symbols + U+FE0E (text presentation) so they render as
          // line-art from symbol fonts, not as emoji. Fallback to SVG paths if desired.
          // U+2648–U+2653 = zodiac symbols; U+FE0E = variation selector (force text/symbol, not emoji)
          const zodiacChars = [];
          for (let k = 0; k < 12; k++) {
            zodiacChars.push(String.fromCodePoint(0x2648 + k, 0xFE0E));
          }
          const signFullNames = [
            "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo",
            "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces",
          ];
          // Hover color by element: Fire=red, Earth=green, Air=yellow, Water=blue (index = sign 0..11)
          const signHoverColors = [
            "#ef4444", "#10b981", "#eab308", "#3b82f6", "#ef4444", "#10b981",
            "#eab308", "#3b82f6", "#ef4444", "#10b981", "#eab308", "#3b82f6",
          ];
          const zodiacLabelRadius = (zodiacRingInner + zodiacRingOuter) / 2;
          // Symbol fonts that render zodiac as line-art (not emoji): Symbola, Segoe UI Symbol, Apple Symbols
          const symbolFont = '"Symbola", "Segoe UI Symbol", "Apple Symbols", "Noto Sans Symbols", "Arial Unicode MS", sans-serif';
          for (let i = 0; i < 12; i++) {
            const signMidDegree = i * 30 + 15;
            const signMidDisplayDegree = chartToDisplayDegree(signMidDegree);
            const pos = getPosition(signMidDisplayDegree, zodiacLabelRadius);
            const signGroup = svg.append("g")
              .attr("class", "sign-group")
              .style("cursor", "pointer");
            signGroup.append("circle")
              .attr("cx", pos.x)
              .attr("cy", pos.y)
              .attr("r", 20)
              .attr("fill", "transparent")
              .attr("opacity", 0);
            const char = zodiacChars[i];
            const hoverColor = signHoverColors[i];
            const textEl = signGroup.append("text")
              .attr("x", pos.x)
              .attr("y", pos.y)
              .attr("text-anchor", "middle")
              .attr("dominant-baseline", "middle")
              .attr("fill", "#e2e8f0")
              .attr("font-size", "28px")
              .attr("font-weight", "normal")
              .attr("font-family", symbolFont)
              .attr("style", "font-variant-emoji: none;")
              .text(char);
            signGroup.on("mouseenter", function () {
              textEl.attr("fill", hoverColor).attr("font-size", "32px");
            })
            .on("mouseleave", function () {
              textEl.attr("fill", "#e2e8f0").attr("font-size", "28px");
            })
            .on("click", function () {
              queryChartElement(signFullNames[i]);
            });
          }

          // Shared planet glyph color and registry so aspects can bump planets on hover
          const planetGlyphColor = "#e2e8f0";
          const planetGroupsByName = {};

          // Draw aspect lines FIRST (so they appear behind planets)
          if (birthChart.aspects && Array.isArray(birthChart.aspects)) {
            const majorAspects = [
              "conjunction",
              "opposition",
              "square",
              "trine",
              "sextile",
            ];
            // Base color: light gray/white; hover color varies by aspect type
            const aspectBaseColor = "#e5e7eb";
            const aspectHoverStrokeColors = {
              conjunction: "#ffffff",
              opposition: "#ef4444", // strong red
              square: "#f87171",     // softer red (not orange)
              trine: "#3b82f6",      // prominent blue
              sextile: "#60a5fa",    // lighter blue
            };
            const planetColorsForAspects = {
              sun: "#FFD700",
              moon: "#C0C0C0",
              mercury: "#8C7853",
              venus: "#FFC649",
              mars: "#FF4500",
              jupiter: "#C88A3D",
              saturn: "#FAD5A5",
              uranus: "#4FD0E7",
              neptune: "#4166F5",
              pluto: "#8B008B",
            };

            birthChart.aspects.forEach((aspect) => {
              if (
                aspect &&
                aspect.aspect &&
                majorAspects.includes(aspect.aspect.toLowerCase()) &&
                aspect.planet1 &&
                aspect.planet2
              ) {
                const planet1 =
                  birthChart.planets[aspect.planet1?.toLowerCase()];
                const planet2 =
                  birthChart.planets[aspect.planet2?.toLowerCase()];

                if (
                  planet1 &&
                  planet2 &&
                  planet1.degree !== undefined &&
                  planet1.degree !== null &&
                  !isNaN(planet1.degree) &&
                  planet2.degree !== undefined &&
                  planet2.degree !== null &&
                  !isNaN(planet2.degree)
                ) {
                  // Aspect lines inward of planets so they don't obscure glyphs (planets at 0.85)
                  const aspectLineRadius = houseOuterRadius * 0.65;
                  const displayDeg1 = chartToDisplayDegree(planet1.degree);
                  const displayDeg2 = chartToDisplayDegree(planet2.degree);
                  const pos1 = getPosition(displayDeg1, aspectLineRadius);
                  const pos2 = getPosition(displayDeg2, aspectLineRadius);
                  const aspectType = aspect.aspect.toLowerCase();
                  const color = aspectBaseColor;
                  const hoverStroke =
                    aspectHoverStrokeColors[aspectType] || aspectBaseColor;

                  // Calculate midpoint for aspect label
                  const midX = (pos1.x + pos2.x) / 2;
                  const midY = (pos1.y + pos2.y) / 2;

                  // Create aspect group for better organization and interactivity
                  const aspectGroup = svg
                    .append("g")
                    .attr("class", "aspect-group")
                    .style("cursor", "pointer");

                  // Invisible wider hit area for the aspect line (inserted before planets for proper z-order)
                  const hitArea = svg
                    .insert("line", "circle")
                    .attr("x1", pos1.x)
                    .attr("y1", pos1.y)
                    .attr("x2", pos2.x)
                    .attr("y2", pos2.y)
                    .attr("stroke", "transparent")
                    .attr("stroke-width", 60) // Very broad invisible hit area for easier hovering/clicking
                    .attr("opacity", 0)
                    .style("cursor", "pointer");

                  // Draw aspect line (behind planets) - append directly since aspects are drawn before planets
                  const aspectLine = svg
                    .append("line")
                    .attr("x1", pos1.x)
                    .attr("y1", pos1.y)
                    .attr("x2", pos2.x)
                    .attr("y2", pos2.y)
                    .attr("stroke", color)
                    .attr("stroke-width", 2.5)
                    .attr("opacity", 0.6)
                    .style("cursor", "pointer");

                  // Ticks at each end: default to base aspect color; turn green on hover
                  const aspectTickLen = 8;
                  const tick1Inner = getPosition(displayDeg1, aspectLineRadius - aspectTickLen / 2);
                  const tick1Outer = getPosition(displayDeg1, aspectLineRadius + aspectTickLen / 2);
                  const tick2Inner = getPosition(displayDeg2, aspectLineRadius - aspectTickLen / 2);
                  const tick2Outer = getPosition(displayDeg2, aspectLineRadius + aspectTickLen / 2);
                  const tick1 = svg.append("line")
                    .attr("x1", tick1Inner.x)
                    .attr("y1", tick1Inner.y)
                    .attr("x2", tick1Outer.x)
                    .attr("y2", tick1Outer.y)
                    .attr("stroke", color)
                    .attr("stroke-width", 2.5)
                    .attr("opacity", 0.6);
                  const tick2 = svg.append("line")
                    .attr("x1", tick2Inner.x)
                    .attr("y1", tick2Inner.y)
                    .attr("x2", tick2Outer.x)
                    .attr("y2", tick2Outer.y)
                    .attr("stroke", color)
                    .attr("stroke-width", 2.5)
                    .attr("opacity", 0.6);

                  // Add aspect label at midpoint for better visibility
                  const aspectName =
                    aspect.aspect.charAt(0).toUpperCase() +
                    aspect.aspect.slice(1);
                  const aspectLabel = aspectGroup
                    .append("text")
                    .attr("x", midX)
                    .attr("y", midY)
                    .attr("text-anchor", "middle")
                    .attr("dominant-baseline", "middle")
                    .attr("fill", color)
                    .attr("font-size", "10px")
                    .attr("font-weight", "bold")
                    .attr("opacity", 0)
                    .text(aspectName.substring(0, 3)); // Abbreviated aspect name

                  // Helper to bump a planet glyph (used from planet hover and aspect hover)
                  function bumpPlanet(planetKey, active) {
                    const entry = planetGroupsByName[planetKey?.toLowerCase()];
                    if (!entry) return;
                    const sym = entry.symbol;
                    if (active) {
                      sym.attr("font-size", "28px").attr("fill", "#10b981");
                    } else {
                      sym.attr("font-size", "24px").attr("fill", planetGlyphColor);
                    }
                  }

                  // Shared hover handlers so both group, line, and hit-area react the same way
                  function handleAspectEnter() {
                    aspectLine
                      .attr("stroke-width", 4)
                      .attr("opacity", 0.9)
                      .attr("stroke", hoverStroke)
                      .transition()
                      .duration(200);
                    aspectLabel
                      .attr("opacity", 0.8)
                      .attr("font-size", "12px")
                      .attr("fill", hoverStroke)
                      .transition()
                      .duration(200);
                    tick1
                      .attr("stroke", "#10b981")
                      .attr("stroke-width", 3)
                      .attr("opacity", 0.9);
                    tick2
                      .attr("stroke", "#10b981")
                      .attr("stroke-width", 3)
                      .attr("opacity", 0.9);
                    hitArea.attr("stroke-width", 80); // Expand hit area even more on hover
                    bumpPlanet(aspect.planet1, true);
                    bumpPlanet(aspect.planet2, true);
                  }
                  function handleAspectLeave() {
                    aspectLine
                      .attr("stroke-width", 2.5)
                      .attr("opacity", 0.6)
                      .attr("stroke", color)
                      .transition()
                      .duration(200);
                    aspectLabel
                      .attr("opacity", 0)
                      .attr("font-size", "10px")
                      .attr("fill", color)
                      .transition()
                      .duration(200);
                    tick1
                      .attr("stroke", color)
                      .attr("stroke-width", 2.5)
                      .attr("opacity", 0.6);
                    tick2
                      .attr("stroke", color)
                      .attr("stroke-width", 2.5)
                      .attr("opacity", 0.6);
                    hitArea.attr("stroke-width", 60); // Reset hit area to broader size
                    bumpPlanet(aspect.planet1, false);
                    bumpPlanet(aspect.planet2, false);
                  }

                  // Hover and click handlers for aspect group
                  aspectGroup
                    .on("mouseenter", handleAspectEnter)
                    .on("mouseleave", handleAspectLeave)
                    .on("click", function () {
                      const planet1Name =
                        aspect.planet1.charAt(0).toUpperCase() +
                        aspect.planet1.slice(1);
                      const planet2Name =
                        aspect.planet2.charAt(0).toUpperCase() +
                        aspect.planet2.slice(1);
                      const aspectName = aspect.aspect.toLowerCase();
                      queryChartElement(
                        `${planet1Name} ${aspectName} ${planet2Name}`,
                      );
                    });

                  // Also make hit area and the visible line interactive
                  hitArea
                    .on("mouseenter", handleAspectEnter)
                    .on("mouseleave", handleAspectLeave)
                    .on("click", function () {
                    const planet1Name =
                      aspect.planet1.charAt(0).toUpperCase() +
                      aspect.planet1.slice(1);
                    const planet2Name =
                      aspect.planet2.charAt(0).toUpperCase() +
                      aspect.planet2.slice(1);
                    const aspectName = aspect.aspect.toLowerCase();
                    queryChartElement(
                      `${planet1Name} ${aspectName} ${planet2Name}`,
                    );
                    });
                  aspectLine
                    .on("mouseenter", handleAspectEnter)
                    .on("mouseleave", handleAspectLeave)
                    .on("click", function () {
                      const planet1Name =
                        aspect.planet1.charAt(0).toUpperCase() +
                        aspect.planet1.slice(1);
                      const planet2Name =
                        aspect.planet2.charAt(0).toUpperCase() +
                        aspect.planet2.slice(1);
                      const aspectName = aspect.aspect.toLowerCase();
                      queryChartElement(
                        `${planet1Name} ${aspectName} ${planet2Name}`,
                      );
                    });
                }
              }
            });
          }

          // Draw all four angles (AC, DC, MC, IC) with wide hit areas so every angle is selectable (before planets so planets on angles remain clickable)
          if (birthChart.angles) {
            const ascDegree = ascendantDegree;
            const mcDegree = birthChart.angles.midheaven?.degree;
            const dcDegree = (ascDegree + 180) % 360; // Descendant = opposite Ascendant
            const icDegree =
              mcDegree !== undefined && mcDegree !== null
                ? (mcDegree + 180) % 360
                : undefined;

            function addAngleLine(
              displayDegree,
              innerPos,
              outerPos,
              labelRadius,
              color,
              labelText,
              queryText,
              groupClass,
              labelLine2,
              labelLine2Sup,
              degreeInline,
              hoverColor,
            ) {
              const g = svg
                .append("g")
                .attr("class", groupClass)
                .style("cursor", "pointer");
              const hitLine = g
                .append("line")
                .attr("x1", innerPos.x)
                .attr("y1", innerPos.y)
                .attr("x2", outerPos.x)
                .attr("y2", outerPos.y)
                .attr("stroke", "transparent")
                .attr("stroke-width", 28)
                .attr("opacity", 0);
              const angleLineColor = "#cbd5e1";
              const visLine = g
                .append("line")
                .attr("x1", innerPos.x)
                .attr("y1", innerPos.y)
                .attr("x2", outerPos.x)
                .attr("y2", outerPos.y)
                .attr("stroke", angleLineColor)
                .attr("stroke-width", 2.5)
                .attr("opacity", 1);
              const labelPos = getPosition(displayDegree, labelRadius);
              const label = g
                .append("text")
                .attr("x", labelPos.x)
                .attr("y", labelPos.y)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", color)
                .attr("font-size", "16px")
                .attr("font-weight", "bold");
              if (labelLine2 != null && labelLine2 !== "") {
                if (degreeInline) {
                  // MC/IC: letter and degree on same line, degree to the right
                  label
                    .append("tspan")
                    .attr("x", labelPos.x)
                    .attr("dy", "0")
                    .text(labelText);
                  label
                    .append("tspan")
                    .attr("class", "angle-degree-line")
                    .attr("dy", "1")
                    .attr("dx", "0.35em")
                    .attr("font-weight", "normal")
                    .attr("font-size", "12px")
                    .text(labelLine2);
                  if (labelLine2Sup != null && labelLine2Sup !== "") {
                    label
                      .append("tspan")
                      .attr("class", "angle-degree-min")
                      .attr("dy", "-0.55em")
                      .attr("dx", "0.2em")
                      .attr("font-size", "8px")
                      .attr("font-weight", "normal")
                      .text(labelLine2Sup);
                  }
                } else {
                  // AC/DC: letter above, degree below
                  label
                    .append("tspan")
                    .attr("x", labelPos.x)
                    .attr("dy", "-0.45em")
                    .text(labelText);
                  label
                    .append("tspan")
                    .attr("dy", "1");
                  label
                    .append("tspan")
                    .attr("class", "angle-degree-line")
                    .attr("x", labelPos.x)
                    .attr("dy", "1.15em")
                    .attr("font-weight", "normal")
                    .attr("font-size", "12px")
                    .text(labelLine2);
                  if (labelLine2Sup != null && labelLine2Sup !== "") {
                    label
                      .append("tspan")
                      .attr("class", "angle-degree-min")
                      .attr("dy", "-0.55em")
                      .attr("dx", "0.2em")
                      .attr("font-size", "8px")
                      .attr("font-weight", "normal")
                      .text(labelLine2Sup);
                  }
                }
              } else {
                label.text(labelText);
              }
              g.on("mouseenter", function () {
                const strokeHover = hoverColor || "#10b981";
                visLine.attr("stroke-width", 3.5).attr("opacity", 1).attr("stroke", strokeHover);
                if (hoverColor) label.attr("fill", strokeHover);
                label.attr("font-size", "20px");
                if (labelLine2 != null && labelLine2 !== "") {
                  label.select(".angle-degree-line").attr("font-size", "14px");
                  label.select(".angle-degree-min").attr("font-size", "9px");
                }
              })
                .on("mouseleave", function () {
                  visLine.attr("stroke-width", 2.5).attr("opacity", 1).attr("stroke", angleLineColor);
                  if (hoverColor) label.attr("fill", color);
                  label.attr("font-size", "16px");
                  if (labelLine2 != null && labelLine2 !== "") {
                    label.select(".angle-degree-line").attr("font-size", "12px");
                    label.select(".angle-degree-min").attr("font-size", "8px");
                  }
                })
                .on("click", function () {
                  queryChartElement(queryText);
                });
            }

            // Angle labels outside the wheel (past zodiac ring); AC/DC further out with degree below
            const angleLabelRadius = totalRadius + 24;
            const angleLabelRadiusHorizon = totalRadius + 28;
            // Format decimal degrees as: degree number, minutes of arc as superscript (′ = U+2032)
            function formatDegreeDM(deg) {
              if (deg == null || isNaN(deg)) return { main: "?", sup: "" };
              const inSign = ((deg % 30) + 30) % 30;
              const d = Math.floor(inSign);
              const m = Math.floor((inSign - d) * 60);
              return { main: String(d), sup: m + "\u2032" };
            }

          // Ascendant (AC) – letter above, degree with minutes of arc upper-right
          const acDisplayDegree = chartToDisplayDegree(ascDegree);
          const acPos = getPosition(acDisplayDegree, houseOuterRadius);
          const innerAcPos = getPosition(acDisplayDegree, innerRadius);
            const ascSign = birthChart.angles?.ascendant?.sign || "";
            const acDM = formatDegreeDM(ascDegree);
            addAngleLine(
              acDisplayDegree,
              innerAcPos,
              acPos,
              angleLabelRadiusHorizon,
              "#cbd5e1",
              "AC",
              `Ascendant${ascSign ? ` ${ascSign}` : ""}`,
              "ac-group",
              acDM.main,
              acDM.sup,
              undefined,
              "#10b981",
            );

            // Descendant (DC) – letter above, degree with minutes of arc upper-right
          const dcDisplayDegree = chartToDisplayDegree(dcDegree);
          const dcPos = getPosition(dcDisplayDegree, houseOuterRadius);
          const innerDcPos = getPosition(dcDisplayDegree, innerRadius);
            const house7 =
              birthChart.houses && birthChart.houses.find
                ? birthChart.houses.find(function (h) {
                    return h && h.number === 7;
                  })
                : birthChart.houses && birthChart.houses[6];
            const dcSign = house7 ? house7.sign || "" : "";
            const dcDM = formatDegreeDM(dcDegree);
            addAngleLine(
              dcDisplayDegree,
              innerDcPos,
              dcPos,
              angleLabelRadiusHorizon,
              "#cbd5e1",
              "DC",
              `Descendant${dcSign ? ` ${dcSign}` : ""}`,
              "dc-group",
              dcDM.main,
              dcDM.sup,
              undefined,
              "#10b981",
            );

            // Midheaven (MC) – letter above, degree with minutes of arc upper-right
            if (
              mcDegree !== undefined &&
              mcDegree !== null &&
              !isNaN(mcDegree)
            ) {
            const mcDisplayDegree = chartToDisplayDegree(mcDegree);
            const mcPos = getPosition(mcDisplayDegree, houseOuterRadius);
            const innerMcPos = getPosition(mcDisplayDegree, innerRadius);
              const mcSign = birthChart.angles?.midheaven?.sign || "";
              const mcDM = formatDegreeDM(mcDegree);
              addAngleLine(
                mcDisplayDegree,
                innerMcPos,
                mcPos,
                angleLabelRadius,
                "#cbd5e1",
                "MC",
                `Midheaven${mcSign ? ` ${mcSign}` : ""}`,
                "mc-group",
                mcDM.main,
                mcDM.sup,
                true,
                "#3b82f6",
              );
            }

            // Imum Coeli (IC) – letter above, degree with minutes of arc upper-right
            if (icDegree !== undefined && !isNaN(icDegree)) {
            const icDisplayDegree = chartToDisplayDegree(icDegree);
            const icPos = getPosition(icDisplayDegree, houseOuterRadius);
            const innerIcPos = getPosition(icDisplayDegree, innerRadius);
              const house4 =
                birthChart.houses && birthChart.houses.find
                  ? birthChart.houses.find(function (h) {
                      return h && h.number === 4;
                    })
                  : birthChart.houses && birthChart.houses[3];
              const icSign = house4 ? house4.sign || "" : "";
              const icDM = formatDegreeDM(icDegree);
              addAngleLine(
                icDisplayDegree,
                innerIcPos,
                icPos,
                angleLabelRadius,
                "#cbd5e1",
                "IC",
                `Imum Coeli${icSign ? ` ${icSign}` : ""}`,
                "ic-group",
                icDM.main,
                icDM.sup,
                true,
                "#60a5fa",
              );
            }
          }

          // Draw planets
          const planetColors = {
            sun: "#FFD700",
            moon: "#C0C0C0",
            mercury: "#8C7853",
            venus: "#FFC649",
            mars: "#FF4500",
            jupiter: "#C88A3D",
            saturn: "#FAD5A5",
            uranus: "#4FD0E7",
            neptune: "#4166F5",
            pluto: "#8B008B",
          };

          // Planet symbols: Unicode + U+FE0E (text presentation), same symbol-font technique as zodiac
          // U+2609 Sun, U+263D Moon, U+263F Mercury, U+2640 Venus, U+2642 Mars, U+2643 Jupiter,
          // U+2644 Saturn, U+2645 Uranus, U+2646 Neptune, U+2647 Pluto
          const planetSymbolCodes = [
            0x2609, 0x263d, 0x263f, 0x2640, 0x2642, 0x2643, 0x2644, 0x2645, 0x2646, 0x2647,
          ];
          const planetOrder = ["sun", "moon", "mercury", "venus", "mars", "jupiter", "saturn", "uranus", "neptune", "pluto"];
          const planetSymbolChars = {};
          planetOrder.forEach((name, idx) => {
            planetSymbolChars[name] = String.fromCodePoint(planetSymbolCodes[idx], 0xfe0e);
          });
          const planetSymbolFont = '"Symbola", "Segoe UI Symbol", "Apple Symbols", "Noto Sans Symbols", "Arial Unicode MS", sans-serif';

          // Draw planets (positioned closer to outer edge to fill wheel)
          // Precompute positions with conjunction spread so overlapping planets don't stack
          const CONJUNCTION_THRESHOLD_DEG = 10; // planets within this many degrees are "conjunct"
          const CONJUNCTION_SPREAD_DEG = 8; // spread conjunct planets by this many degrees so they don't overlap
          if (birthChart.planets && typeof birthChart.planets === "object") {
            const planetList = [];
            Object.entries(birthChart.planets).forEach(
              ([planetName, planetData]) => {
                if (
                  planetData &&
                  planetData.degree !== undefined &&
                  planetData.degree !== null &&
                  !isNaN(planetData.degree) &&
                  planetData.house !== undefined &&
                  planetData.house !== null
                ) {
                  const displayDegree = chartToDisplayDegree(planetData.degree);
                  planetList.push({ planetName, planetData, displayDegree });
                }
              },
            );
            planetList.sort((a, b) => a.displayDegree - b.displayDegree);

            // Cluster by angular proximity (conjunctions); assign angle offset so planets don't overlap
            function angularDist(a, b) {
              const d = Math.abs((a - b + 360) % 360);
              return Math.min(d, 360 - d);
            }
            const clusters = [];
            let cluster = planetList.length > 0 ? [planetList[0]] : [];
            for (let i = 1; i < planetList.length; i++) {
              const d =
                (planetList[i].displayDegree -
                  planetList[i - 1].displayDegree +
                  360) %
                360;
              if (d <= CONJUNCTION_THRESHOLD_DEG) {
                cluster.push(planetList[i]);
              } else {
                if (cluster.length) clusters.push(cluster);
                cluster = [planetList[i]];
              }
            }
            if (cluster.length) clusters.push(cluster);
            if (clusters.length > 1 && cluster.length > 0) {
              const firstDeg = clusters[0][0].displayDegree;
              const lastDeg = cluster[cluster.length - 1].displayDegree;
              if (angularDist(firstDeg, lastDeg) <= CONJUNCTION_THRESHOLD_DEG) {
                clusters[0] = cluster.concat(clusters[0]);
                clusters.pop();
              }
            }
            clusters.forEach((c) => {
              const K = c.length;
              const spread = CONJUNCTION_SPREAD_DEG;
              const startOffset = -((K - 1) * spread) / 2;
              c.forEach((p, i) => {
                p.angleOffset = startOffset + i * spread;
              });
            });

            const planetGlyphRadius = houseOuterRadius * 0.85;
            planetList.forEach(
              ({ planetName, planetData, displayDegree, angleOffset = 0 }) => {
                const effectiveDegree = displayDegree + angleOffset;
                const pos = getPosition(effectiveDegree, planetGlyphRadius);

                const planetGroup = svg
                  .append("g")
                  .attr("class", "planet-group")
                  .style("cursor", "pointer");

                planetGroup
                  .append("circle")
                  .attr("cx", pos.x)
                  .attr("cy", pos.y)
                  .attr("r", 22)
                  .attr("fill", "transparent")
                  .attr("opacity", 0);

                const planetSymbol = planetGroup
                  .append("text")
                  .attr("x", pos.x)
                  .attr("y", pos.y)
                  .attr("text-anchor", "middle")
                  .attr("dominant-baseline", "middle")
                  .attr("fill", planetGlyphColor)
                  .attr("font-size", "24px")
                  .attr("font-weight", "normal")
                  .attr("font-family", planetSymbolFont)
                  .attr("style", "font-variant-emoji: none;")
                  .text(planetSymbolChars[planetName.toLowerCase()] || planetName.charAt(0).toUpperCase());

                const houseLabelPos = getPosition(
                  effectiveDegree,
                  planetGlyphRadius - 18,
                );
                planetGroup
                  .append("text")
                  .attr("x", houseLabelPos.x)
                  .attr("y", houseLabelPos.y)
                  .attr("text-anchor", "middle")
                  .attr("dominant-baseline", "middle")
                  .attr("fill", "#94a3b8")
                  .attr("font-size", "11px")
                  .attr("font-weight", "normal")
                  .attr("opacity", 0.9)
                  .text(planetData.house);

                planetGroupsByName[planetName.toLowerCase()] = {
                  group: planetGroup,
                  symbol: planetSymbol,
                };

                planetGroup
                  .on("mouseenter", function () {
                    planetSymbol
                      .attr("font-size", "28px")
                      .attr("fill", "#10b981")
                      .transition()
                      .duration(200);
                  })
                  .on("mouseleave", function () {
                    planetSymbol
                      .attr("font-size", "24px")
                      .attr("fill", planetGlyphColor)
                      .transition()
                      .duration(200);
                  })
                  .on("click", function () {
                    const planetDisplayName =
                      planetName.charAt(0).toUpperCase() + planetName.slice(1);
                    const planetSign = planetData.sign || "";
                    queryChartElement(
                      `${planetDisplayName}${planetSign ? ` ${planetSign}` : ""}`,
                    );
                  });
              },
            );
          }

          // Center remains empty - no label

          renderChartTable(birthChart);
          console.log("[CHART WHEEL] Chart wheel rendered successfully");
        } catch (error) {
          console.error("[CHART WHEEL] Error rendering chart wheel:", error);
          const container = document.getElementById("chart-wheel-container");
          if (container) {
            container.innerHTML = `<div style="color: #ff6b6b; padding: 20px; text-align: center;">Error rendering chart wheel: ${error.message}<br><small>Check console for details</small></div>`;
          }
          clearChartTable();
        }
      }

      // Add function to toggle raw chart data visibility
      function toggleRawChartData(button) {
        const container = button.parentElement;
        let rawDataDiv = container.querySelector(".raw-chart-data");

        if (!rawDataDiv) {
          // Create raw data div if it doesn't exist
          rawDataDiv = document.createElement("div");
          rawDataDiv.className = "raw-chart-data";
          rawDataDiv.style.display = "none";

          const birthChart = JSON.parse(button.dataset.chart);
          let rawData = "";

          // Birth Data
          rawData += "Birth Data:\n";
          rawData += `Date: ${birthChart.birthData.date}\n`;
          rawData += `Time: ${birthChart.birthData.time}\n`;
          rawData += `Location: ${birthChart.birthData.location.latitude}°N, ${birthChart.birthData.location.longitude}°E (UTC${birthChart.birthData.location.timezone})\n\n`;

          // Angular Points
          rawData += "Angular Points:\n";
          rawData += `Ascendant: ${birthChart.angles.ascendant.degree.toFixed(
            2,
          )}° ${birthChart.angles.ascendant.sign} (${
            birthChart.angles.ascendant.element
          })\n`;
          rawData += `Midheaven: ${birthChart.angles.midheaven.degree.toFixed(
            2,
          )}° ${birthChart.angles.midheaven.sign} (${
            birthChart.angles.midheaven.element
          })\n\n`;

          // Planetary Positions
          rawData += "Planetary Positions:\n";
          for (const [planet, data] of Object.entries(birthChart.planets)) {
            rawData += `${
              planet.charAt(0).toUpperCase() + planet.slice(1)
            }: ${data.degree.toFixed(2)}° ${data.sign} (${data.element})`;
            if (data.isRetrograde) rawData += " ℞";
            rawData += ` - House ${data.house}\n`;
          }
          rawData += "\n";

          // Houses
          rawData += "Houses:\n";
          birthChart.houses.forEach((house) => {
            rawData += `House ${house.number}: ${house.degree.toFixed(2)}° ${
              house.sign
            } (${house.element})\n`;
          });
          rawData += "\n";

          // Aspects
          rawData += "Aspects:\n";
          birthChart.aspects.forEach((aspect) => {
            rawData += `${
              aspect.planet1.charAt(0).toUpperCase() + aspect.planet1.slice(1)
            } ${aspect.aspect} ${
              aspect.planet2.charAt(0).toUpperCase() + aspect.planet2.slice(1)
            } (${aspect.orb.toFixed(2)}° orb)\n`;
          });

          rawDataDiv.textContent = rawData;
          container.appendChild(rawDataDiv);
        }

        if (rawDataDiv.style.display === "none") {
          rawDataDiv.style.display = "block";
          button.textContent = "Hide Raw Chart Data";
        } else {
          rawDataDiv.style.display = "none";
          button.textContent = "View Raw Chart Data";
        }
      }

      function showSpinner() {
        const spinnerContainer = document.createElement("div");
        spinnerContainer.className = "spinner-container";

        const spinner = document.createElement("div");
        spinner.className = "spinner";

        const typingIndicator = document.createElement("div");
        typingIndicator.className = "typing-indicator";
        typingIndicator.textContent = "AstroGuide is thinking";

        spinnerContainer.appendChild(spinner);
        spinnerContainer.appendChild(typingIndicator);
        chatMessages.appendChild(spinnerContainer);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function hideSpinner() {
        const spinnerContainer = document.querySelector(".spinner-container");
        if (spinnerContainer) {
          spinnerContainer.remove();
        }
      }
    </script>
  </body>
</html>
